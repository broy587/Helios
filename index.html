function LeadCard({lead,onView,onTouchDragStart,isDragging}) {
  const dark=useDark();
  const colors=getStageColor(lead.stage);
  const cardRef=React.useRef(null);
  const state=React.useRef({moved:false,timer:null,startX:0,startY:0});

  React.useEffect(()=>{
    const el=cardRef.current;
    if(!el) return;
    const s=state.current;

    const onTS=e=>{
      s.moved=false;
      s.startX=e.touches[0].clientX;
      s.startY=e.touches[0].clientY;
      s.timer=setTimeout(()=>{
        if(!s.moved){
          if(navigator.vibrate) navigator.vibrate(50);
          onTouchDragStart({_x:s.startX,_y:s.startY,_isMobile:true},lead.id);
        }
      },500);
    };
    const onTM=e=>{
      const dx=Math.abs(e.touches[0].clientX-s.startX);
      const dy=Math.abs(e.touches[0].clientY-s.startY);
      if(dx>8||dy>8){s.moved=true;clearTimeout(s.timer);s.timer=null;}
    };
    const onTE=e=>{
      clearTimeout(s.timer);s.timer=null;
      if(!s.moved){onView(lead);}
    };
    const onMD=e=>{
      if(e.button!==0)return;
      const startX=e.clientX, startY=e.clientY;
      let moved=false;
      let dragStarted=false;
      const beginDrag=()=>{
        if(dragStarted) return;
        dragStarted=true;
        onTouchDragStart({_isMouse:true,_mouseEvent:e},lead.id);
      };
      const onMM=ev=>{
        if(!moved && (Math.abs(ev.clientX-startX)>5||Math.abs(ev.clientY-startY)>5)){
          moved=true;
          clearTimeout(timer);
          beginDrag(); // movement past threshold = drag (works for fast drags too)
        }
      };
      const onMU=()=>{
        clearTimeout(timer);
        window.removeEventListener("mousemove",onMM);
        window.removeEventListener("mouseup",onMU);
        // Only a real click (no drag ever started, no movement) opens the lead
        if(!dragStarted && !moved) onView(lead);
      };
      // Press-and-hold also starts a drag even without moving yet
      const timer=setTimeout(beginDrag,200);
      window.addEventListener("mousemove",onMM);
      window.addEventListener("mouseup",onMU);
    };

    el.addEventListener("touchstart",onTS,{passive:true});
    el.addEventListener("touchmove",onTM,{passive:true});
    el.addEventListener("touchend",onTE);
    el.addEventListener("mousedown",onMD);
    return()=>{
      el.removeEventListener("touchstart",onTS);
      el.removeEventListener("touchmove",onTM);
      el.removeEventListener("touchend",onTE);
      el.removeEventListener("mousedown",onMD);
      clearTimeout(s.timer);
    };
  },[lead.id]);

  const isDrag=isDragging;
  return (
    <div ref={cardRef}
      style={{background:dark?"#1e293b":"#faf6f0",border:`1.5px solid ${lead.is_arc?"#ef4444":colors.border}`,borderRadius:10,padding:"10px 14px",marginBottom:8,cursor:"grab",boxShadow:`0 1px 4px ${dark?"rgba(0,0,0,0.3)":"rgba(0,0,0,0.07)"}`,userSelect:"none",WebkitUserSelect:"none",display:"flex",alignItems:"center",justifyContent:"space-between",opacity:isDrag?0.3:lead.is_arc?0.65:1}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
          <div style={{fontWeight:700,fontSize:14,color:dark?"#f1f5f9":"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lead.name||"Unnamed Lead"}</div>
          {lead.is_arc && lead.stage!=="ARC / Cancels" && <span style={{fontSize:9,fontWeight:800,padding:"1px 5px",borderRadius:4,background:"#ef4444",color:"#fff",flexShrink:0,letterSpacing:"0.05em"}}>ARC</span>}
        </div>
        {lead.appointment && (()=>{
          try {
            const MMAP = {"Jan":"01","Feb":"02","Mar":"03","Apr":"04","May":"05","Jun":"06","Jul":"07","Aug":"08","Sep":"09","Oct":"10","Nov":"11","Dec":"12"};
            const raw = lead.appointment;
            // Handle both formats:
            // Old: "Jun 15, 2026 - 5:00 PM to 6:30 PM"
            // New: same, just parse correctly either way
            const dashIdx = raw.indexOf(' - ');
            if (dashIdx === -1) return <div style={{fontSize:10,color:dark?"#a78bfa":"#6b2d4e",fontWeight:600,marginBottom:2}}>{raw}</div>;
            const datePart = raw.substring(0, dashIdx).trim();
            const afterDash = raw.substring(dashIdx + 3).trim();
            const startTime = afterDash.indexOf(' to ') > -1 ? afterDash.substring(0, afterDash.indexOf(' to ')).trim() : afterDash;
            // Parse "Jun 15, 2026" or "Jun 15, 2026"
            const cleaned = datePart.replace(/,/g,'').trim();
            const dp = cleaned.split(/\s+/);
            const month = MMAP[dp[0]] || String(Object.keys(MMAP).indexOf(dp[0])+1).padStart(2,'0');
            const day = dp[1] ? String(parseInt(dp[1])).padStart(2,'0') : '??';
            if (month === "00" || day === "NaN") return <div style={{fontSize:10,color:dark?"#a78bfa":"#6b2d4e",fontWeight:600,marginBottom:2}}>{raw}</div>;
            return <div style={{fontSize:10,color:dark?"#a78bfa":"#6b2d4e",fontWeight:600,marginBottom:2}}>{month}/{day} @ {startTime}</div>;
          } catch(e) {
            return <div style={{fontSize:10,color:dark?"#a78bfa":"#6b2d4e",fontWeight:600,marginBottom:2}}>{lead.appointment}</div>;
          }
        })()}
        {(lead.soft_solid||lead.confirmed) && (
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {lead.soft_solid && <span style={{fontSize:10,fontWeight:600,color:"#4338ca",background:"#e0e7ff",borderRadius:20,padding:"1px 7px"}}>{lead.soft_solid}</span>}
            {lead.confirmed && <span style={{fontSize:10,fontWeight:600,color:lead.confirmed==="Yes"?"#065f46":"#7f1d1d",background:lead.confirmed==="Yes"?"#d1fae5":"#fee2e2",borderRadius:20,padding:"1px 7px"}}>{lead.confirmed==="Yes"?"Confirmed":"Not Confirmed"}</span>}
          </div>
        )}
        {lead.follow_up_date && (()=>{
          let label = lead.follow_up_date;
          try {
            const parts = lead.follow_up_date.split("-"); // YYYY-MM-DD
            if(parts.length===3){
              const d = new Date(Number(parts[0]), Number(parts[1])-1, Number(parts[2]));
              const today = new Date(); today.setHours(0,0,0,0);
              const diff = Math.round((d - today)/86400000);
              const md = `${parts[1]}/${parts[2]}`;
              if(diff===0) label = `Today (${md})`;
              else if(diff===1) label = `Tomorrow (${md})`;
              else if(diff<0) label = `${md} (overdue)`;
              else label = md;
            }
          } catch(e){}
          const overdue = (()=>{ try { const p=lead.follow_up_date.split("-"); const d=new Date(Number(p[0]),Number(p[1])-1,Number(p[2])); const t=new Date(); t.setHours(0,0,0,0); return d<t; } catch(e){ return false; } })();
          return (
            <div style={{display:"flex",marginTop:3}}>
              <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:10,fontWeight:700,color:overdue?"#b91c1c":"#92400e",background:overdue?"#fee2e2":"#fef3c7",borderRadius:20,padding:"1px 8px"}}>
                🔔 Follow up: {label}
              </span>
            </div>
          );
        })()}
      </div>
      <div style={{fontSize:16,color:"#cbd5e1",flexShrink:0,marginLeft:8}}>≡</div>
    </div>
  );
}

function PipelineBoard({leads,onAddLead,onStageChange,onLeadView,allLeads,onViewInCanvass,onSwitchToCalendar,profiles,repProfiles,onTransfer}) {
  const dark=useDark();
  const [dragId,setDragId]=useState(null);
  const [dragPos,setDragPos]=useState({x:0,y:0});
  const [dragOver,setDragOver]=useState(null);
  const [detailId,setDetailId]=useState(null);
  const [search,setSearch]=useState("");
  const [showDropdown,setShowDropdown]=useState(false);
  const columnRefs=useRef({});
  const boardRef=useRef(null);

  const scrollAnim=useRef(null);
  const draggingLead=leads.find(l=>l.id===dragId);
  const dropdownResults=search.length>0?leads.filter(l=>[l.name,l.phone,l.address,l.esiid,l.meter,l.notes].some(v=>v&&v.toLowerCase().includes(search.toLowerCase()))).slice(0,8):[];

  const startDrag = (id, x, y, isMouse) => {
    setDragId(id); setDragPos({x,y});
    const EDGE=60,MAX_SPEED=12;
    const startScroll=dir=>{if(scrollAnim.current)return;const step=()=>{if(!boardRef.current)return;boardRef.current.scrollLeft+=dir==="right"?MAX_SPEED:-MAX_SPEED;scrollAnim.current=requestAnimationFrame(step);};scrollAnim.current=requestAnimationFrame(step);};
    const stopScroll=()=>{if(scrollAnim.current){cancelAnimationFrame(scrollAnim.current);scrollAnim.current=null;}};
    const getPos=ev=>isMouse?{x:ev.clientX,y:ev.clientY}:{x:ev.touches[0].clientX,y:ev.touches[0].clientY};
    const onMove=ev=>{
      if(!isMouse)ev.preventDefault();
      const {x,y}=getPos(ev); setDragPos({x,y});
      if(x<EDGE){stopScroll();startScroll("left");}else if(x>window.innerWidth-EDGE){stopScroll();startScroll("right");}else stopScroll();
      let found=null;for(const [stage,el] of Object.entries(columnRefs.current)){if(!el)continue;const r=el.getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom){found=stage;break;}}setDragOver(found);
    };
    const onEnd=()=>{
      setDragId(null);setDragOver(over=>{
        // Prevent dragging into ARC column via drag-drop
        if(over && over!=="ARC / Cancels") onStageChange(id,over);
        return null;
      });stopScroll();
      if(isMouse){window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onEnd);}
      else{window.removeEventListener("touchmove",onMove);window.removeEventListener("touchend",onEnd);}
    };
    if(isMouse){window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onEnd);}
    else{window.addEventListener("touchmove",onMove,{passive:false});window.addEventListener("touchend",onEnd);}
  };

  const handleTouchDragStart=(e,id)=>{
    if(e._isMouse) startDrag(id,e._mouseEvent.clientX,e._mouseEvent.clientY,true);
    else if(e._isMobile||e._x!==undefined) startDrag(id,e._x,e._y,false);
    else if(e.touches&&e.touches[0]) startDrag(id,e.touches[0].clientX,e.touches[0].clientY,false);
  };

  const detailLead=(allLeads||leads).find(l=>l.id===detailId)||null;
  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{display:"flex",gap:8,padding:"12px 16px 0",alignItems:"center",position:"relative",zIndex:200}}>
        <div style={{flex:1,position:"relative"}}>
          <input placeholder="Search by name, phone, address..." value={search}
            onChange={e=>{setSearch(e.target.value);setShowDropdown(true);}}
            onFocus={()=>{if(search)setShowDropdown(true);}}
            onBlur={()=>setTimeout(()=>setShowDropdown(false),200)}
            style={{width:"100%",padding:"8px 12px",borderRadius:8,border:`1.5px solid ${dark?"#334155":"#e2e8f0"}`,fontSize:13,outline:"none",background:dark?"#1e293b":"#fff",color:dark?"#f1f5f9":"#0f172a",boxSizing:"border-box"}}/>
          {showDropdown&&search&&dropdownResults.length>0 && (
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:dark?"#1e293b":"#fff",borderRadius:10,boxShadow:"0 8px 30px rgba(0,0,0,0.25)",border:`1.5px solid ${dark?"#334155":"#e2e8f0"}`,marginTop:4,maxHeight:280,overflowY:"auto",zIndex:300}}>
              {dropdownResults.map(lead=>{const colors=getStageColor(lead.stage);return(
                <div key={lead.id} onMouseDown={()=>{setSearch("");setShowDropdown(false);setDetailId(lead.id);}}
                  style={{padding:"10px 14px",borderBottom:"1px solid #f1f5f9",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:14,color:"#0f172a"}}>{lead.name||"Unnamed"}</div>
                    <div style={{fontSize:12,color:"#94a3b8",marginTop:1}}>{[lead.phone,lead.address].filter(Boolean).join(" - ")}</div>
                  </div>
                  <span style={{background:colors.badge,color:"#fff",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700,whiteSpace:"nowrap",marginLeft:8}}>{lead.stage}</span>
                </div>
              );})}
            </div>
          )}
          {showDropdown&&search&&dropdownResults.length===0 && (
            <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",borderRadius:10,boxShadow:"0 8px 30px rgba(0,0,0,0.15)",border:"1.5px solid #e2e8f0",marginTop:4,padding:"14px",textAlign:"center",color:"#94a3b8",fontSize:13,zIndex:300}}>No leads found</div>
          )}
        </div>
        <button onClick={onAddLead} style={{background:"linear-gradient(135deg,#1a2456,#6b2d4e)",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontWeight:700,cursor:"pointer",fontSize:14,whiteSpace:"nowrap"}}>+ Add</button>
      </div>
      <div ref={boardRef} style={{display:"flex",gap:14,padding:"14px 16px 40px",overflowX:"auto",alignItems:"flex-start",flex:1,background:dark?"#0f172a":"#f5ede0",WebkitOverflowScrolling:"touch"}}>
        {/* Main pipeline stages — no ARC */}
        {STAGES.map(stage=>{
          const colors=getStageColor(stage),stageLeads=leads.filter(l=>l.stage===stage&&!l.is_arc),isOver=dragOver===stage;
          return (
            <div key={stage} ref={el=>{columnRefs.current[stage]=el;}}
              style={{minWidth:220,maxWidth:240,flex:"0 0 220px",background:isOver?colors.bg:dark?"#1e293b":"#faf6f0",borderRadius:12,border:`2px solid ${isOver?colors.border:dark?"#334155":"#c8b8a2"}`,transition:"border-color 0.15s,background 0.15s",boxShadow:isOver?`0 0 0 3px ${colors.border}33`:`0 1px 4px ${dark?"rgba(0,0,0,0.3)":"rgba(0,0,0,0.06)"}`}}>
              <div style={{padding:"12px 14px 10px",borderBottom:`1.5px solid ${dark?"#334155":"#f1f5f9"}`}}>
                <div style={{fontSize:12,fontWeight:700,color:dark?"#e2e8f0":"#1e293b",lineHeight:1.3}}>{stage}</div>
              </div>
              <div style={{padding:"10px 10px 6px",minHeight:80}}>
                {stageLeads.length===0?(
                  <div style={{textAlign:"center",color:isOver?colors.border:dark?"#475569":"#cbd5e1",fontSize:12,paddingTop:20,paddingBottom:10,fontWeight:isOver?700:400}}>Drop here</div>
                ):stageLeads.map(lead=>(
                  <LeadCard key={lead.id} lead={lead} onView={l=>{if(!dragId)setDetailId(l.id);}} onTouchDragStart={handleTouchDragStart} isDragging={dragId===lead.id}/>
                ))}
              </div>
            </div>
          );
        })}
        {/* ARC / Cancels — separate column, no drag-drop */}
        {(()=>{
          const arcLeads=leads.filter(l=>l.is_arc);
          return (
            <div style={{minWidth:220,maxWidth:240,flex:"0 0 220px",background:dark?"#1e293b":"#fff",borderRadius:12,border:`2px solid #ef4444`,boxShadow:`0 1px 4px ${dark?"rgba(0,0,0,0.3)":"rgba(0,0,0,0.06)"}`,opacity:0.9}}>
              <div style={{padding:"12px 14px 10px",borderBottom:`1.5px solid ${dark?"#334155":"#fee2e2"}`,display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fff5f5",borderRadius:"12px 12px 0 0"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#ef4444",lineHeight:1.3}}>ARC / Cancels</div>
                <span style={{fontSize:9,fontWeight:700,color:"#ef4444",opacity:0.8,background:"#fee2e2",padding:"2px 6px",borderRadius:4}}>NO DRAG</span>
              </div>
              <div style={{padding:"10px 10px 6px",minHeight:80}}>
                {arcLeads.length===0?(
                  <div style={{textAlign:"center",color:dark?"#475569":"#cbd5e1",fontSize:12,paddingTop:20,paddingBottom:10}}>No cancelled leads</div>
                ):arcLeads.map(lead=>(
                  <LeadCard key={lead.id} lead={lead} onView={l=>{if(!dragId)setDetailId(l.id);}} onTouchDragStart={()=>{}} isDragging={false}/>
                ))}
              </div>
            </div>
          );
        })()}
      </div>
      {dragId&&draggingLead && (
        <div style={{position:"fixed",left:dragPos.x-100,top:dragPos.y-22,width:200,background:"#fff",border:"2px solid #f97316",borderRadius:10,padding:"10px 14px",boxShadow:"0 8px 30px rgba(0,0,0,0.25)",pointerEvents:"none",zIndex:9999,fontWeight:700,fontSize:14,color:"#1e293b",transform:"rotate(2deg)"}}>
          {draggingLead.name||"Lead"}
        </div>
      )}
      {detailId && (
        <DetailModal lead={detailLead} onClose={()=>setDetailId(null)}
          onEdit={l=>{setDetailId(null);onLeadView(l,"edit");}}
          onDelete={id=>{onLeadView(id,"delete");setDetailId(null);}}
          repProfiles={repProfiles||[]} onTransfer={onTransfer||(()=>{})} profiles={profiles}
          onUpdate={updated=>onLeadView(updated,"update")}
          onViewInCanvass={onViewInCanvass}
          onSwitchToCalendar={onSwitchToCalendar}/>
      )}
    </div>
  );
}

function useDarkMode() {
  const [dark, setDark] = useState(() => localStorage.getItem("pp_dark")==="1");
  useEffect(()=>{
    document.body.classList.toggle("dark", dark);
    localStorage.setItem("pp_dark", dark?"1":"0");
  },[dark]);
  return [dark, setDark];
}

function TicketCopyButton({text, dark}) {
  const [copied, setCopied] = React.useState(false);
  const doCopy = (e) => {
    if(e) e.stopPropagation();
    const finish=()=>{ setCopied(true); setTimeout(()=>setCopied(false),1500); };
    const fallback=()=>{ try{const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.focus();ta.select();document.execCommand("copy");document.body.removeChild(ta);}catch(err){} finish(); };
    try {
      if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(finish).catch(fallback); }
      else fallback();
    } catch(err){ finish(); }
  };
  return (
    <button onClick={doCopy} title="Copy ticket text"
      style={{padding:"4px 9px",borderRadius:20,border:`1.5px solid ${copied?"#86efac":(dark?"#334155":"#e2e8f0")}`,background:copied?"#dcfce7":(dark?"#1e293b":"#fff"),color:copied?"#166534":"#6b2d4e",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
      {copied?"✓ Copied":"📋 Copy"}
    </button>
  );
}

function ReportIssuePage({onBack, user, profile, isOwner, onTicketsChanged}) {
  const dark=useDark();
  const [message, setMessage] = useState("");
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);
  const [newPile, setNewPile] = useState("urgent");
  const [tickets, setTickets] = useState([]);
  const [loadingTickets, setLoadingTickets] = useState(true);
  const [dragId, setDragId] = useState(null);
  const [dragY, setDragY] = useState(0);
  const [dropInfo, setDropInfo] = useState(null); // {pile, index}
  const urgentRef = React.useRef(null);
  const ideasRef = React.useRef(null);
  const scrollRef = React.useRef(null);
  const dragState = React.useRef({active:false, id:null});

  const pileOf = (t) => (t && t.pile==="ideas") ? "ideas" : "urgent";
  const rebuild = (arr) => {
    const starFirst = (list) => [...list.filter(t=>t.starred), ...list.filter(t=>!t.starred)];
    return [...starFirst(arr.filter(t=>pileOf(t)==="urgent")), ...starFirst(arr.filter(t=>pileOf(t)==="ideas"))];
  };

  const persistAll = async (arr) => {
    try {
      await Promise.all(arr.map((t,idx)=> sb.from("support_tickets").update({sort_order:idx, pile:pileOf(t), starred:!!t.starred}).eq("id",t.id)));
    } catch(e){
      try {
        await Promise.all(arr.map((t,idx)=> sb.from("support_tickets").update({sort_order:idx, pile:pileOf(t)}).eq("id",t.id)));
      } catch(e2){
        try { await Promise.all(arr.map((t,idx)=> sb.from("support_tickets").update({sort_order:idx}).eq("id",t.id))); }
        catch(e3){ console.error("Ticket save failed:", e3); }
      }
    }
  };

  const toggleStar = (t) => {
    const newStarred = !t.starred;
    setTickets(prev=>{
      let arr = prev.map(x=>x.id===t.id?{...x,starred:newStarred}:x);
      if(newStarred){
        const moved = arr.find(x=>x.id===t.id);
        const others = arr.filter(x=>x.id!==t.id);
        const pile = pileOf(moved);
        const samePile = others.filter(x=>pileOf(x)===pile);
        const otherPile = others.filter(x=>pileOf(x)!==pile);
        arr = rebuild([...otherPile, moved, ...samePile]);
      }
      persistAll(arr);
      return arr;
    });
  };

  const beginReorder = (clientY, isTouch, id) => {
    const scroller = scrollRef.current;
    dragState.current = {active:true, id, startY:clientY, lastY:clientY, drop:null, startScroll: scroller?scroller.scrollTop:0, raf:null};
    setDragId(id);
    setDragY(0);
    setDropInfo(null);
    const computeDrop = (cy) => {
      const uRect = urgentRef.current ? urgentRef.current.getBoundingClientRect() : null;
      const iRect = ideasRef.current ? ideasRef.current.getBoundingClientRect() : null;
      let pile;
      if(uRect && iRect) pile = cy < (uRect.bottom + iRect.top)/2 ? "urgent" : "ideas";
      else pile = uRect ? "urgent" : "ideas";
      const cont = pile==="urgent" ? urgentRef.current : ideasRef.current;
      let index = 0;
      if(cont){
        const cards = Array.prototype.slice.call(cont.children).filter(el=>{ const cid=el.getAttribute("data-ticket-id"); return cid && cid!==dragState.current.id; });
        for(let k=0;k<cards.length;k++){ const r=cards[k].getBoundingClientRect(); if(cy > r.top + r.height/2) index++; }
      }
      return {pile, index};
    };
    const updateVisual = (cy) => {
      const st = dragState.current;
      const sc = scrollRef.current;
      const scrollDelta = sc ? (sc.scrollTop - st.startScroll) : 0;
      st.drop = computeDrop(cy);
      setDragY((cy - st.startY) + scrollDelta);
      setDropInfo(st.drop);
    };
    const autoScroll = () => {
      const st = dragState.current;
      if(!st.active){ st.raf=null; return; }
      const sc = scrollRef.current;
      if(sc){
        const rect = sc.getBoundingClientRect();
        const edge = 64;
        const cy = st.lastY;
        let dv = 0;
        if(cy < rect.top + edge) dv = -Math.min(16, (rect.top + edge - cy)/3 + 4);
        else if(cy > rect.bottom - edge) dv = Math.min(16, (cy - (rect.bottom - edge))/3 + 4);
        if(dv !== 0){
          const before = sc.scrollTop;
          sc.scrollTop = before + dv;
          if(sc.scrollTop !== before) updateVisual(cy);
        }
      }
      st.raf = requestAnimationFrame(autoScroll);
    };
    const onMove = (ev) => {
      const st = dragState.current;
      if(!st.active) return;
      if(isTouch && ev.cancelable) ev.preventDefault();
      const cy = isTouch ? (ev.touches&&ev.touches[0]?ev.touches[0].clientY:st.lastY) : ev.clientY;
      st.lastY = cy;
      updateVisual(cy);
    };
    const onEnd = () => {
      const st = dragState.current;
      if(st.raf) cancelAnimationFrame(st.raf);
      const drop = st.drop || computeDrop(st.lastY);
      st.active=false;
      setDragId(null);
      setDragY(0);
      setDropInfo(null);
      setTickets(prev=>{
        const dragged = prev.find(t=>t.id===st.id);
        if(!dragged) return prev;
        const others = prev.filter(t=>t.id!==st.id);
        const targetList = others.filter(t=>pileOf(t)===drop.pile);
        const otherList = others.filter(t=>pileOf(t)!==drop.pile);
        targetList.splice(Math.min(drop.index, targetList.length), 0, {...dragged, pile:drop.pile});
        const finalArr = rebuild([...otherList, ...targetList]);
        persistAll(finalArr);
        return finalArr;
      });
      if(isTouch){ window.removeEventListener("touchmove",onMove); window.removeEventListener("touchend",onEnd); window.removeEventListener("touchcancel",onEnd); }
      else { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onEnd); }
    };
    dragState.current.raf = requestAnimationFrame(autoScroll);
    if(isTouch){
      window.addEventListener("touchmove",onMove,{passive:false});
      window.addEventListener("touchend",onEnd);
      window.addEventListener("touchcancel",onEnd);
    } else {
      window.addEventListener("mousemove",onMove);
      window.addEventListener("mouseup",onEnd);
    }
  };

  useEffect(()=>{
    loadTickets();
  },[]);

  const loadTickets = async () => {
    setLoadingTickets(true);
    const base = () => { let q = sb.from("support_tickets").select("*, profiles(name,email)"); if(!isOwner) q = q.eq("submitted_by", user.id); return q; };
    let {data,error} = await base().order("sort_order",{ascending:true,nullsFirst:false}).order("created_at",{ascending:false});
    if(error){ // sort_order column may not exist yet — fall back gracefully
      ({data} = await base().order("created_at",{ascending:false}));
    }
    setTickets(rebuild(data||[]));
    setLoadingTickets(false);
  };

  const handleSubmit = async () => {
    if(!message.trim()) return;
    setSending(true);
    let {data,error} = await sb.from("support_tickets").insert({submitted_by:user.id, message:message.trim(), pile:newPile}).select("*, profiles(name,email)").single();
    if(error){ // pile column may not exist yet — retry without it
      ({data} = await sb.from("support_tickets").insert({submitted_by:user.id, message:message.trim()}).select("*, profiles(name,email)").single());
      if(data) data = {...data, pile:newPile};
    }
    if(data) setTickets(ts=>{ const arr=rebuild([data,...ts]); persistAll(arr); return arr; });
    setSending(false); setSent(true); setMessage("");
    setTimeout(()=>setSent(false),3000);
  };

  const handleResolve = async (id) => {
    await sb.from("support_tickets").delete().eq("id",id);
    setTickets(ts=>{
      const updated = ts.filter(t=>t.id!==id);
      if(onTicketsChanged) onTicketsChanged(updated.length);
      return updated;
    });
  };

  const [editingId, setEditingId] = useState(null);
  const [editText, setEditText] = useState("");
  const [savingEdit, setSavingEdit] = useState(false);

  const startEdit = (t) => { setEditingId(t.id); setEditText(t.message||""); };
  const cancelEdit = () => { setEditingId(null); setEditText(""); };
  const saveEdit = async (id) => {
    if(!editText.trim()) return;
    setSavingEdit(true);
    await sb.from("support_tickets").update({message:editText.trim()}).eq("id",id);
    setTickets(ts=>ts.map(t=>t.id===id?{...t,message:editText.trim()}:t));
    setSavingEdit(false);
    setEditingId(null);
    setEditText("");
  };

  const urgentTickets = tickets.filter(t=>pileOf(t)==="urgent");
  const ideasTickets = tickets.filter(t=>pileOf(t)==="ideas");

  const renderCard = (t) => {
    const isDragged = dragId===t.id;
    const transform = isDragged ? `translateY(${dragY}px) scale(1.02)` : "none";
    return (
      <div key={t.id} data-ticket-id={t.id} style={{background:dark?"#0f172a":"#fff",borderRadius:12,padding:"14px",marginBottom:10,border:`1.5px solid ${isDragged?"#f97316":(dark?"#334155":"#e2e8f0")}`,boxShadow:isDragged?"0 12px 28px rgba(0,0,0,0.28)":"0 1px 4px rgba(0,0,0,0.06)",opacity:isDragged?0.97:1,transform:transform,transition:isDragged?"none":"box-shadow 0.15s, border-color 0.15s",position:"relative",zIndex:isDragged?50:1,touchAction:isDragged?"none":"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div
            onMouseDown={e=>{e.preventDefault();e.stopPropagation();beginReorder(e.clientY,false,t.id);}}
            onTouchStart={e=>{e.stopPropagation();if(e.touches&&e.touches[0])beginReorder(e.touches[0].clientY,true,t.id);}}
            title="Drag to move / reorder"
            style={{touchAction:"none",cursor:isDragged?"grabbing":"grab",color:isDragged?"#f97316":"#cbd5e1",fontSize:20,lineHeight:1,padding:"2px 2px",flexShrink:0,userSelect:"none",WebkitUserSelect:"none"}}>⠿</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:14,fontWeight:700,color:dark?"#f1f5f9":"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.profiles?.name||"Unknown"}</div>
            <div style={{fontSize:11,color:"#94a3b8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.profiles?.email} · {new Date(t.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div>
          </div>
        </div>
        {editingId===t.id ? (
          <div>
            <textarea value={editText} onChange={e=>setEditText(e.target.value)} rows={4}
              style={{width:"100%",fontSize:13,color:"#475569",lineHeight:1.5,background:"#f8fafc",borderRadius:8,padding:"8px 10px",border:"1.5px solid #c8b8a2",resize:"vertical",fontFamily:"inherit",outline:"none",boxSizing:"border-box"}}/>
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button onClick={()=>saveEdit(t.id)} disabled={savingEdit||!editText.trim()}
                style={{padding:"6px 14px",borderRadius:8,border:"none",background:editText.trim()?"linear-gradient(135deg,#f97316,#ea580c)":"#e2e8f0",color:editText.trim()?"#fff":"#94a3b8",fontWeight:700,fontSize:12,cursor:editText.trim()?"pointer":"default"}}>
                {savingEdit?"Saving...":"Save"}
              </button>
              <button onClick={cancelEdit}
                style={{padding:"6px 14px",borderRadius:8,border:`1.5px solid ${dark?"#334155":"#e2e8f0"}`,background:dark?"#1e293b":"#fff",color:"#64748b",fontWeight:600,fontSize:12,cursor:"pointer"}}>
                Cancel
              </button>
            </div>
          </div>
        ) : (
          <React.Fragment>
            <div style={{fontSize:13,color:dark?"#cbd5e1":"#475569",lineHeight:1.5,background:dark?"#1e293b":"#f8fafc",borderRadius:8,padding:"8px 10px",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{t.message}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:10}}>
              <button onClick={()=>startEdit(t)} title="Edit ticket"
                style={{padding:"6px 14px",borderRadius:20,border:`1.5px solid ${dark?"#334155":"#e2e8f0"}`,background:dark?"#1e293b":"#fff",color:"#6b2d4e",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                ✏️ Edit
              </button>
              <TicketCopyButton text={t.message||""} dark={dark}/>
              <button onClick={()=>toggleStar(t)} title={t.starred?"Starred — tap to unstar":"Star (moves to top of pile)"}
                style={{padding:"6px 13px",borderRadius:20,border:`1.5px solid ${t.starred?"#fbbf24":(dark?"#334155":"#e2e8f0")}`,background:t.starred?(dark?"#422006":"#fef3c7"):(dark?"#1e293b":"#fff"),color:t.starred?"#d97706":"#94a3b8",fontSize:14,fontWeight:700,cursor:"pointer",lineHeight:1}}>
                {t.starred?"★":"☆"}
              </button>
              {isOwner && (
                <button onClick={()=>handleResolve(t.id)}
                  style={{padding:"6px 14px",borderRadius:20,border:"1.5px solid #fee2e2",background:dark?"#1e293b":"#fff",color:"#ef4444",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",marginLeft:"auto"}}>
                  Resolve
                </button>
              )}
            </div>
          </React.Fragment>
        )}
      </div>
    );
  };

  const pileDropStyle = (which) => ({minHeight:54,padding:"2px",marginBottom:8,borderRadius:12,transition:"background 0.15s, outline-color 0.15s",background:dropInfo&&dropInfo.pile===which?(dark?"rgba(249,115,22,0.08)":"#fff7ed"):"transparent",outline:dropInfo&&dropInfo.pile===which?"2px dashed #fdba74":"2px dashed transparent",outlineOffset:2});

  return (
    <div ref={scrollRef} style={{flex:1,overflowY:"auto",background:dark?"#1e293b":"#fff"}}>
      <div style={{padding:"20px 20px 0",display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
        <button onClick={onBack} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8",padding:0}}>‹</button>
        <div style={{fontSize:17,fontWeight:800,color:dark?"#f1f5f9":"#0f172a"}}>Submit a Ticket</div>
      </div>
      <div style={{padding:"0 20px"}}>
        {sent && <div style={{background:"#d1fae5",border:"1.5px solid #10b981",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#065f46",marginBottom:16}}>Ticket submitted! We'll look into it.</div>}
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:12,fontWeight:600,color:"#475569",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>Describe the issue or idea in detail</label>
          <textarea value={message} onChange={e=>setMessage(e.target.value)} rows={5}
            placeholder="What went wrong? Be as specific as possible..."
            style={{...inputStyle,resize:"vertical"}}/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:12,fontWeight:600,color:"#475569",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>Type</label>
          <div style={{display:"flex",gap:8}}>
            {[{k:"urgent",label:"🔴 Urgent",c:"#ef4444",bg:"#fff5f5",tc:"#b91c1c"},{k:"ideas",label:"💡 Idea",c:"#f59e0b",bg:"#fffbeb",tc:"#b45309"}].map(o=>(
              <button key={o.k} type="button" onClick={()=>setNewPile(o.k)}
                style={{flex:1,padding:"9px 0",borderRadius:8,border:`2px solid ${newPile===o.k?o.c:"#e2e8f0"}`,background:newPile===o.k?o.bg:"#fff",color:newPile===o.k?o.tc:"#64748b",fontWeight:newPile===o.k?700:500,cursor:"pointer",fontSize:14}}>
                {o.label}
              </button>
            ))}
          </div>
        </div>
        <button onClick={handleSubmit} disabled={sending||!message.trim()}
          style={{width:"100%",padding:"12px 0",borderRadius:10,border:"none",background:message.trim()?"linear-gradient(135deg,#f97316,#ea580c)":"#e2e8f0",color:message.trim()?"#fff":"#94a3b8",fontWeight:700,cursor:message.trim()?"pointer":"default",fontSize:15,marginBottom:24}}>
          {sending?"Submitting...":"Submit Ticket"}
        </button>

        {/* Ticket list — two piles: Urgent and Ideas */}
        {(isOwner || tickets.length>0 || loadingTickets) && (
          <div>
            <div style={{fontSize:14,fontWeight:800,color:dark?"#f1f5f9":"#0f172a",marginBottom:6}}>{isOwner?"All Tickets":"Your Tickets"}</div>
            {isOwner && !loadingTickets && tickets.length>0 && <div style={{fontSize:12,color:"#94a3b8",marginBottom:14}}>Drag a ticket by its ⠿ handle to move it between Urgent and Ideas.</div>}
            {loadingTickets && <div style={{fontSize:13,color:"#94a3b8"}}>Loading...</div>}
            {!loadingTickets && tickets.length===0 && <div style={{fontSize:13,color:"#94a3b8",textAlign:"center",padding:"20px 0"}}>{isOwner?"No tickets yet.":"You haven't submitted any tickets yet."}</div>}
            {!loadingTickets && tickets.length>0 && (
              <>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{fontSize:14,fontWeight:800,color:"#dc2626"}}>🔴 Urgent</span>
                  <span style={{fontSize:11,fontWeight:700,color:dark?"#94a3b8":"#64748b",background:dark?"#334155":"#f1f5f9",borderRadius:10,padding:"1px 8px"}}>{urgentTickets.length}</span>
                </div>
                <div ref={urgentRef} style={pileDropStyle("urgent")}>
                  {urgentTickets.map(renderCard)}
                  {urgentTickets.length===0 && <div style={{textAlign:"center",padding:"14px 0",color:"#cbd5e1",fontSize:12}}>No urgent tickets — drag one here</div>}
                </div>
                <div style={{borderTop:`2px solid ${dark?"#334155":"#e2e8f0"}`,margin:"16px 0"}}/>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{fontSize:14,fontWeight:800,color:"#d97706"}}>💡 Ideas</span>
                  <span style={{fontSize:11,fontWeight:700,color:dark?"#94a3b8":"#64748b",background:dark?"#334155":"#f1f5f9",borderRadius:10,padding:"1px 8px"}}>{ideasTickets.length}</span>
                </div>
                <div ref={ideasRef} style={pileDropStyle("ideas")}>
                  {ideasTickets.map(renderCard)}
                  {ideasTickets.length===0 && <div style={{textAlign:"center",padding:"14px 0",color:"#cbd5e1",fontSize:12}}>No ideas yet — drag one here</div>}
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Hamburger Drawer ──────────────────────────────────────────────────
function HamburgerDrawer({open, onClose, user, profile, setProfile, teams, teamMembers, dark, setDark, onSignOut, isOwner, unreadTickets, onTicketRead}) {
  const darkCtx=useDark();
  const [page, setPage] = useState("menu"); // menu | profile | settings | report

  // Reset to menu when drawer closes
  useEffect(()=>{ if(!open) setTimeout(()=>setPage("menu"),300); },[open]);

  const menuItems = [
    {key:"profile", icon:"👤", label:"Profile"},
    {key:"settings", icon:"⚙️", label:"Settings"},
    {key:"report", icon:"🚩", label:"Submit a Ticket", badge:isOwner&&unreadTickets>0?unreadTickets:0},
  ];

  return (
    <>
      <div className={`drawer-overlay${open?" open":""}`} onClick={onClose}/>
      <div className={`drawer${open?" open":""}`}>
        {/* Header */}
        <div style={{background:"linear-gradient(135deg,#1a2456,#2d1f3d)",padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {profile.avatar_url
              ? <img src={profile.avatar_url} style={{width:36,height:36,borderRadius:"50%",objectFit:"cover",border:"2px solid #f97316"}}/>
              : <div style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#6b2d4e,#1a2456)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#fff"}}>
                  {(profile.nickname||profile.name||"?")[0].toUpperCase()}
                </div>
            }
            <div>
              <div style={{color:"#fff",fontWeight:700,fontSize:14}}>{profile.nickname||profile.name}</div>
              <div style={{color:"#94a3b8",fontSize:11}}>{isOwner?"owner":profile.role}</div>
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#94a3b8",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>

        {/* Pages */}
        {page==="menu" && (
          <div style={{flex:1,overflowY:"auto",padding:"12px 0"}}>
            {menuItems.map((item,i)=>(
              <button key={item.key} onClick={()=>setPage(item.key)}
                style={{width:"100%",padding:"16px 20px",border:"none",borderBottom:`1px solid ${dark?"#334155":"#f1f5f9"}`,background:dark?"#1e293b":"#fff",display:"flex",alignItems:"center",gap:14,cursor:"pointer",textAlign:"left"}}>
                <span style={{fontSize:20,width:28,textAlign:"center"}}>{item.icon}</span>
                <span style={{fontSize:15,fontWeight:600,color:dark?"#f1f5f9":"#0f172a",flex:1}}>{item.label}</span>
                {item.badge>0 && <span style={{background:"#ef4444",color:"#fff",borderRadius:99,fontSize:10,fontWeight:800,padding:"1px 6px",marginRight:4}}>{item.badge}</span>}
                <span style={{color:"#cbd5e1",fontSize:16}}>›</span>
              </button>
            ))}
            <button onClick={()=>{onClose();onSignOut();}}
              style={{width:"100%",padding:"16px 20px",border:"none",borderTop:`1.5px solid ${dark?"#334155":"#f1f5f9"}`,background:dark?"#1e293b":"#fff",display:"flex",alignItems:"center",gap:14,cursor:"pointer",textAlign:"left",marginTop:8}}>
              <span style={{fontSize:20,width:28,textAlign:"center"}}>🚪</span>
              <span style={{fontSize:15,fontWeight:600,color:"#ef4444",flex:1}}>Log Out</span>
            </button>
          </div>
        )}

        {page==="profile" && (
          <ProfilePage
            profile={profile} user={user} teams={teams} teamMembers={teamMembers}
            onBack={()=>setPage("menu")}
            onSave={(updated)=>setProfile(updated)}
          />
        )}

        {page==="settings" && (
          <SettingsPage onBack={()=>setPage("menu")} dark={dark} setDark={setDark}/>
        )}

        {page==="report" && (
          <ReportIssuePage onBack={()=>setPage("menu")} user={user} profile={profile} isOwner={isOwner}
            onTicketsChanged={(count)=>onTicketRead&&onTicketRead(count)}/>
        )}
      </div>
    </>
  );
}



// ── Canvass Home Popup ────────────────────────────────────────────────
const DISPOSITIONS = [
  {key:"lead", label:"LEAD", color:"#10b981", icon:"⚡"},
  {key:"nh",   label:"NH",   color:"#3b82f6", icon:"🏠"},
  {key:"cb",   label:"CB",   color:"#f59e0b", icon:"↩️"},
  {key:"nn",   label:"NN",   color:"#f97316", icon:"⏰"},
  {key:"nq",   label:"NQ",   color:"#ef4444", icon:"🚫"},
];

function HomePopup({home, onClose, onDelete, onDisposition, onSaveNote, onSaveOwner, onCreateLead, leads, onStageChange, currentUser}) {
  const [note, setNote] = React.useState(home.notes||"");
  const [noteSaved, setNoteSaved] = React.useState(false);
  const [errMsg, setErrMsg] = React.useState("");
  // Re-sync note when home prop updates (after save)
  React.useEffect(()=>{ setNote(home.notes||""); },[home.notes]);

  const [saving, setSaving] = React.useState(false);

  const saveToMap = async() => {
    if(!home._isTemp) return;
    setSaving(true);
    const {data} = await sb.from("canvass_homes").insert({
      address:home.address, lat:home.lat, lng:home.lng,
      prescreen:home.prescreen||null, notes:note||null,
      updated_at:new Date().toISOString()
    }).select().single();
    if(data) { onClose(); }
    setSaving(false);
  };

  // Check if a lead already exists for this address
  const linkedLead = home._isPipelineLead
    ? leads&&leads.find(l=>l.id===home._leadId)
    : leads && home.address
      ? leads.find(l=>l.address&&l.address.toLowerCase().includes(home.address.split(",")[0].toLowerCase().trim()))
      : null;

  const saveNote = async() => {
    if(!note.trim()) return;
    setNoteSaved(false);
    try {
      if(!home.id||home._isTemp||home._isPipelineLead){
        const {data,error} = await sb.from("canvass_homes").insert({
          address:home.address,
          lat:home.lat||null,
          lng:home.lng||null,
          owner_name:home.owner_name||null,
          phone:home.phone||null,
          notes:note.trim(),
          prescreen:home.prescreen||null,
          added_by:currentUser?.id||null,
          updated_at:new Date().toISOString()
        }).select().single();
        if(error) throw error;
        if(data&&onSaveNote) await onSaveNote(data, note.trim());
      } else {
        await onSaveNote(home, note.trim());
      }
      setErrMsg("");
      setNoteSaved(true);
      setTimeout(()=>setNoteSaved(false), 2000);
    } catch(e){ console.error("Save note failed:", e); setErrMsg("Couldn't save note: "+((e&&(e.message||e.details))||"unknown error")); }
  };

  const [ownerName, setOwnerName] = React.useState(home.owner_name||"");
  const [ownerSaved, setOwnerSaved] = React.useState(false);
  const [savingOwner, setSavingOwner] = React.useState(false);
  React.useEffect(()=>{ setOwnerName(home.owner_name||""); },[home.owner_name, home.id]);

  const [phoneVal, setPhoneVal] = React.useState(home.phone||"");
  const [emailVal, setEmailVal] = React.useState(home.email||"");
  const [contactSaved, setContactSaved] = React.useState(false);
  const [savingContact, setSavingContact] = React.useState(false);
  React.useEffect(()=>{ setPhoneVal(home.phone||""); setEmailVal(home.email||""); },[home.phone, home.email, home.id]);

  const saveContact = async() => {
    const ph = phoneVal.trim();
    const em = emailVal.trim();
    setSavingContact(true);
    setContactSaved(false);
    const doWrite = async(includeEmail) => {
      if(!home.id||home._isTemp||home._isPipelineLead){
        const row = {
          address:home.address,
          lat:home.lat||null,
          lng:home.lng||null,
          owner_name:(ownerName.trim()||home.owner_name||null),
          phone:ph||null,
          notes:home.notes||null,
          prescreen:home.prescreen||null,
          added_by:currentUser?.id||null,
          updated_at:new Date().toISOString()
        };
        if(includeEmail) row.email = em||null;
        const {data,error} = await sb.from("canvass_homes").insert(row).select().single();
        if(error) throw error;
        if(data&&onSaveOwner) await onSaveOwner(includeEmail?data:{...data,email:em||null});
      } else {
        const upd = {phone:ph||null,updated_at:new Date().toISOString()};
        if(includeEmail) upd.email = em||null;
        const {error} = await sb.from("canvass_homes").update(upd).eq("id",home.id);
        if(error) throw error;
        if(onSaveOwner) await onSaveOwner({...home,phone:ph||null,email:em||null});
      }
    };
    try {
      await doWrite(true);
      setErrMsg("");
      setContactSaved(true);
      setTimeout(()=>setContactSaved(false), 2000);
    } catch(e){
      // Fall back if the email column doesn't exist in the table yet
      const msg=(e&&(e.message||e.details||""))+"";
      if(/email/i.test(msg) && /column|schema|find/i.test(msg)){
        try {
          await doWrite(false);
          setErrMsg("Saved phone. Email needs an 'email' column on canvass_homes — see note.");
          setContactSaved(true);
          setTimeout(()=>setContactSaved(false), 2000);
          console.warn("Saved phone only — add an 'email' column to canvass_homes to persist email.");
        } catch(e2){ console.error("Save contact failed:", e2); setErrMsg("Couldn't save contact: "+((e2&&(e2.message||e2.details))||"unknown error")); }
      } else {
        console.error("Save contact failed:", e);
        setErrMsg("Couldn't save contact: "+(msg||"unknown error"));
      }
    }
    setSavingContact(false);
  };

  const saveOwnerName = async() => {
    const val = ownerName.trim();
    setSavingOwner(true);
    setOwnerSaved(false);
    try {
      if(!home.id||home._isTemp||home._isPipelineLead){
        const {data,error} = await sb.from("canvass_homes").insert({
          address:home.address,
          lat:home.lat||null,
          lng:home.lng||null,
          owner_name:val||null,
          phone:home.phone||null,
          notes:home.notes||null,
          prescreen:home.prescreen||null,
          added_by:currentUser?.id||null,
          updated_at:new Date().toISOString()
        }).select().single();
        if(error) throw error;
        if(data&&onSaveOwner) await onSaveOwner(data);
      } else {
        const {error} = await sb.from("canvass_homes").update({owner_name:val||null,updated_at:new Date().toISOString()}).eq("id",home.id);
        if(error) throw error;
        if(onSaveOwner) await onSaveOwner({...home,owner_name:val||null});
      }
      setErrMsg("");
      setOwnerSaved(true);
      setTimeout(()=>setOwnerSaved(false), 2000);
    } catch(e){ console.error("Save owner name failed:", e); setErrMsg("Couldn't save name: "+((e&&(e.message||e.details))||"unknown error")); }
    setSavingOwner(false);
  };

  return (
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(18,18,28,0.97)",borderRadius:"20px 20px 0 0",maxHeight:"75vh",overflowY:"auto",zIndex:5000,boxShadow:"0 -8px 40px rgba(0,0,0,0.5)"}}>
      {/* Header */}
      <div style={{padding:"20px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1,minWidth:0}}>
          {linkedLead && (
            <div onClick={()=>onCreateLead(home, linkedLead)}
              style={{display:"inline-flex",alignItems:"center",gap:6,background:"#10b981",borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:700,color:"#fff",marginBottom:8,cursor:"pointer"}}>
              ⚡ Lead created — tap to view
            </div>
          )}
          <div style={{fontSize:20,fontWeight:800,color:"#fff",marginBottom:2}}>
            {home.owner_name || home.address.split(",")[0]}
          </div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>{home.address}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,marginLeft:12}}>
          <button onClick={()=>onCreateLead({...home,owner_name:(ownerName.trim()||home.owner_name||""),phone:(phoneVal.trim()||home.phone||""),email:(emailVal.trim()||home.email||""),notes:(note.trim()||home.notes||"")}, linkedLead||null)}
            title={linkedLead?"View the linked pipeline lead":"Add this home as a pipeline lead"}
            style={{background:"#f97316",border:"none",borderRadius:20,padding:"7px 14px",cursor:"pointer",color:"#fff",fontSize:12,fontWeight:800,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5}}>
            ⚡ {linkedLead?"View Lead":"Add Lead"}
          </button>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",color:"#fff",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
        </div>
      </div>

      {/* Disposition buttons */}
      <div style={{padding:"12px 20px 4px"}}>
        {errMsg && (
          <div style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.4)",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#fca5a5",lineHeight:1.4}}>
            {errMsg}
          </div>
        )}
        <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:10}}>Disposition</div>
        <div style={{display:"flex",gap:8,justifyContent:"space-between"}}>
          {DISPOSITIONS.map(d=>{
            const isActive = home.prescreen===d.key;
            return (
              <div key={d.key} onClick={()=>{
                // Toggle off if already active
                const newDisp = home.prescreen===d.key ? "" : d.key;
                onDisposition(home, newDisp);
                if(d.key==="lead" && newDisp==="lead") onCreateLead(home, null);
              }}
                style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:"pointer"}}>
                <div style={{
                  width:54,height:54,borderRadius:"50%",
                  background:isActive?d.color:"rgba(255,255,255,0.06)",
                  border:`2.5px solid ${isActive?d.color:"rgba(255,255,255,0.12)"}`,
                  display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:22,transition:"all 0.2s",
                  boxShadow:isActive?`0 0 14px ${d.color}88`:"none",
                }}>
                  {d.icon}
                </div>
                <span style={{fontSize:10,fontWeight:800,color:isActive?d.color:"rgba(255,255,255,0.35)",letterSpacing:"0.05em"}}>{d.label}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Homeowner */}
      <div style={{padding:"0 20px 12px"}}>
        <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Homeowner</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input
            type="text"
            value={ownerName}
            onChange={e=>setOwnerName(e.target.value)}
            placeholder="Add homeowner name..."
            style={{flex:1,minWidth:0,padding:"10px 12px",borderRadius:8,border:"1.5px solid rgba(255,255,255,0.15)",background:"rgba(30,30,50,0.8)",color:"#fff",fontSize:13,fontFamily:"inherit",outline:"none"}}/>
          <button onClick={saveOwnerName} disabled={savingOwner||ownerName.trim()===(home.owner_name||"").trim()}
            style={{padding:"10px 16px",borderRadius:8,border:"none",background:(savingOwner||ownerName.trim()===(home.owner_name||"").trim())?"rgba(255,255,255,0.12)":"#f97316",color:(savingOwner||ownerName.trim()===(home.owner_name||"").trim())?"rgba(255,255,255,0.4)":"#fff",fontWeight:700,fontSize:13,cursor:(savingOwner||ownerName.trim()===(home.owner_name||"").trim())?"default":"pointer",whiteSpace:"nowrap"}}>
            {savingOwner?"Saving...":ownerSaved?"✓ Saved":"Save"}
          </button>
        </div>
      </div>

      {/* Contact Info */}
      <div style={{padding:"0 20px 12px"}}>
        <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Contact Info</div>
        <input
          type="tel"
          value={phoneVal}
          onChange={e=>setPhoneVal(e.target.value)}
          placeholder="Phone number..."
          style={{width:"100%",boxSizing:"border-box",padding:"10px 12px",borderRadius:8,border:"1.5px solid rgba(255,255,255,0.15)",background:"rgba(30,30,50,0.8)",color:"#fff",fontSize:13,fontFamily:"inherit",outline:"none",marginBottom:8}}/>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input
            type="email"
            value={emailVal}
            onChange={e=>setEmailVal(e.target.value)}
            placeholder="Email..."
            style={{flex:1,minWidth:0,padding:"10px 12px",borderRadius:8,border:"1.5px solid rgba(255,255,255,0.15)",background:"rgba(30,30,50,0.8)",color:"#fff",fontSize:13,fontFamily:"inherit",outline:"none"}}/>
          <button onClick={saveContact} disabled={savingContact||(phoneVal.trim()===(home.phone||"").trim()&&emailVal.trim()===(home.email||"").trim())}
            style={{padding:"10px 16px",borderRadius:8,border:"none",background:(savingContact||(phoneVal.trim()===(home.phone||"").trim()&&emailVal.trim()===(home.email||"").trim()))?"rgba(255,255,255,0.12)":"#f97316",color:(savingContact||(phoneVal.trim()===(home.phone||"").trim()&&emailVal.trim()===(home.email||"").trim()))?"rgba(255,255,255,0.4)":"#fff",fontWeight:700,fontSize:13,cursor:(savingContact||(phoneVal.trim()===(home.phone||"").trim()&&emailVal.trim()===(home.email||"").trim()))?"default":"pointer",whiteSpace:"nowrap"}}>
            {savingContact?"Saving...":contactSaved?"✓ Saved":"Save"}
          </button>
        </div>
      </div>

      {/* Notes */}
      <div style={{padding:"0 20px 12px"}}>
        <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Notes</div>
        {/* Saved note display */}
        {home.notes&&(
          <div style={{background:"rgba(255,255,255,0.06)",borderRadius:10,padding:"10px 14px",marginBottom:8,borderLeft:"3px solid #6b2d4e"}}>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.85)",lineHeight:1.5,marginBottom:6,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{home.notes}</div>
            <button onMouseDown={async e=>{
              e.preventDefault();
              if(home.id) await sb.from("canvass_homes").update({notes:null,updated_at:new Date().toISOString()}).eq("id",home.id);
              home.notes=null;
              if(onSaveNote) onSaveNote({...home,notes:null},"");
            }}
              style={{background:"none",border:"none",color:"rgba(255,68,68,0.7)",fontSize:11,cursor:"pointer",padding:0,fontWeight:600}}>
              ✕ Delete note
            </button>
          </div>
        )}
        {/* Add/edit note input */}
        <div style={{background:"rgba(255,255,255,0.06)",borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"flex-end",gap:10}}>
          <textarea value={note} onChange={e=>setNote(e.target.value)}
            placeholder={home.notes?"Edit note...":"Add a note..."}
            rows={2}
            style={{flex:1,background:"none",border:"none",outline:"none",color:"#fff",fontSize:13,resize:"none",fontFamily:"inherit",lineHeight:1.5}}/>
          <button onMouseDown={e=>{e.preventDefault();saveNote();}}
            onClick={saveNote}
            style={{background:noteSaved?"#10b981":"#3b82f6",border:"none",borderRadius:8,padding:"6px 14px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0}}>
            {noteSaved?"✓ Saved":"Save"}
          </button>
        </div>
      </div>

      {/* Lead Stage — shows right after dispositions if linked */}
      <div style={{padding:"12px 20px 4px"}}>
        <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Lead Stage</div>
        {linkedLead ? (
          <div style={{background:"rgba(255,255,255,0.06)",borderRadius:12,padding:"12px 14px"}}>
            <select value={linkedLead.stage||""} onChange={async e=>{
              const newStage=e.target.value;
              const entry={ts:formatTs(),by:(currentUser&&(currentUser.name||currentUser.email))||"Unknown",changes:[`Stage: "${linkedLead.stage}" to "${newStage}"`]};
              await sb.from("leads").update({stage:newStage,history:[entry,...(linkedLead.history||[])],updated_at:new Date().toISOString()}).eq("id",linkedLead.id);
              if(onStageChange) onStageChange(linkedLead.id, newStage, entry);
            }}
              style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid rgba(255,255,255,0.15)",background:"rgba(30,30,50,0.8)",color:"#fff",fontSize:13,fontFamily:"inherit",outline:"none",marginBottom:8}}>
              {STAGES.map(s=><option key={s} value={s} style={{background:"#1e293b",color:"#fff"}}>{s}</option>)}
            </select>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.4)"}}>
              {linkedLead.name&&<span style={{marginRight:10}}>👤 {linkedLead.name}</span>}
              {linkedLead.phone&&<span>📱 {linkedLead.phone}</span>}
            </div>
          </div>
        ) : (
          <div style={{background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"12px 14px",fontSize:12,color:"rgba(255,255,255,0.25)",textAlign:"center"}}>
            No pipeline lead linked — tap ⚡ LEAD to create one
          </div>
        )}
      </div>

      {/* Delete */}
      {!home._isTemp&&!home._isPipelineLead&&home.id&&(
        <div style={{padding:"0 20px 32px"}}>
          <button onClick={()=>onDelete(home.id)}
            style={{width:"100%",padding:"10px 0",borderRadius:10,border:"1px solid rgba(239,68,68,0.3)",background:"transparent",color:"#ef4444",fontWeight:600,cursor:"pointer",fontSize:13}}>
            Remove Pin
          </button>
        </div>
      )}
    </div>
  );
}
