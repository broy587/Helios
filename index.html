function App() {
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  // ── Pull-to-refresh ──────────────────────────────────────────────
  const [pullDist, setPullDist] = useState(0);
  const [refreshing, setRefreshing] = useState(false);
  const pullRef = React.useRef(0);
  React.useEffect(()=>{
    const THRESH=70, MAX=110;
    let startY=0, pulling=false, atTop=false, mouseDown=false;
    const scrollableAncestor=(el)=>{
      while(el && el.nodeType===1 && el!==document.body){
        try { const s=window.getComputedStyle(el); if(/(auto|scroll)/.test(s.overflowY) && el.scrollHeight>el.clientHeight) return el; } catch(e){}
        el=el.parentElement;
      }
      return null;
    };
    const startAt=(clientY, target)=>{
      if(refreshing) return;
      startY=clientY;
      const sc=scrollableAncestor(target);
      atTop = sc ? sc.scrollTop<=0 : ((window.scrollY||window.pageYOffset||0)<=0);
      pulling=false;
    };
    const moveTo=(clientY, ev)=>{
      if(refreshing) return;
      const dy=clientY-startY;
      if(atTop && dy>6){
        pulling=true;
        if(ev && ev.cancelable) ev.preventDefault();
        const d=Math.min(dy*0.5, MAX);
        pullRef.current=d;
        setPullDist(d);
      } else if(dy<=0 && pulling){
        pulling=false; pullRef.current=0; setPullDist(0);
      }
    };
    const endPull=()=>{
      if(refreshing) return;
      if(pulling && pullRef.current>=THRESH){
        setRefreshing(true);
        setTimeout(()=>{ try{window.location.reload();}catch(e){} }, 250);
      } else {
        pullRef.current=0; setPullDist(0);
      }
      pulling=false;
    };
    // Touch (phones / tablets)
    const onTouchStart=(e)=>{ const t=e.touches&&e.touches[0]; if(t) startAt(t.clientY, e.target); };
    const onTouchMove=(e)=>{ const t=e.touches&&e.touches[0]; if(t) moveTo(t.clientY, e); };
    // Mouse (laptop / desktop)
    const onMouseDown=(e)=>{ if(e.button!==0) return; mouseDown=true; startAt(e.clientY, e.target); };
    const onMouseMove=(e)=>{ if(!mouseDown) return; moveTo(e.clientY, e); };
    const onMouseUp=()=>{ if(!mouseDown) return; mouseDown=false; endPull(); };
    document.addEventListener("touchstart",onTouchStart,{passive:true});
    document.addEventListener("touchmove",onTouchMove,{passive:false});
    document.addEventListener("touchend",endPull);
    document.addEventListener("touchcancel",endPull);
    document.addEventListener("mousedown",onMouseDown);
    document.addEventListener("mousemove",onMouseMove);
    document.addEventListener("mouseup",onMouseUp);
    return ()=>{
      document.removeEventListener("touchstart",onTouchStart); document.removeEventListener("touchmove",onTouchMove); document.removeEventListener("touchend",endPull); document.removeEventListener("touchcancel",endPull);
      document.removeEventListener("mousedown",onMouseDown); document.removeEventListener("mousemove",onMouseMove); document.removeEventListener("mouseup",onMouseUp);
    };
  }, [refreshing]);

  const [drawerOpen,setDrawerOpen]=useState(false);
  const [unreadTickets,setUnreadTickets]=useState(0);
  const [dark,setDark]=useDarkMode();
  const [loading,setLoading]=useState(true);
  const [leads,setLeads]=useState([]);
  const [profiles,setProfiles]=useState([]);
  const [teams,setTeams]=useState([]);
  const [teamMembers,setTeamMembers]=useState({}); // { teamId: [{ user_id, ... }] }
  const [teamGoals,setTeamGoals]=useState({}); // { teamId: { weekly: {...}, quarterly: {...} } }
  const [tab,setTab]=useState("pipeline");
  const [modal,setModal]=useState({open:false,lead:null});
  const [detailId,setDetailId]=useState(null);
  const [pipelineFilter,setPipelineFilter]=useState("mine");
  const [teamDropOpen,setTeamDropOpen]=useState(false);
  const [repDropOpen,setRepDropOpen]=useState(false);
  const [canvassLeadFilter,setCanvassLeadFilter]=useState(["mine"]);
  const [calendarEventUrl,setCalendarEventUrl]=useState(null); // mine | team:id | rep:id | all
  // Persist team tab selection
  const [teamTabSelected,setTeamTabSelected]=useState("all");
  // Persist stats tab selections
  const [statsTimeFilter,setStatsTimeFilter]=useState("today");
  const [statsCustomRange,setStatsCustomRange]=useState(null);
  const [statsTeamId,setStatsTeamId]=useState("all");
  const [statsRepSearch,setStatsRepSearch]=useState("");
  const [statsRepId,setStatsRepId]=useState("");
  // Persist recruits filter
  const [recruitsFilter,setRecruitsFilter]=useState("mine");
  const [recruitsTeamDropOpen,setRecruitsTeamDropOpen]=useState(false);
  const [recruitsRepDropOpen,setRecruitsRepDropOpen]=useState(false);

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{
      if(data.session&&data.session.user)loadUser(data.session.user);
      else setLoading(false);
    });
  },[]);

  // Load unread ticket count for owner
  const refreshTicketCount = React.useCallback(async () => {
    if (!user || user.id!==OWNER_ID) return;
    const {count} = await sb.from("support_tickets").select("*",{count:"exact",head:true});
    setUnreadTickets(count||0);
  },[user]);

  useEffect(()=>{
    refreshTicketCount();
    const interval = setInterval(refreshTicketCount, 30000);
    return ()=>clearInterval(interval);
  },[refreshTicketCount]);

  // Refresh count when drawer opens
  useEffect(()=>{ if(drawerOpen) refreshTicketCount(); },[drawerOpen]);

  // Auto-set team tab to user's first team once teams load (if no saved state)
  useEffect(()=>{
    if (!user || !teams.length) return;
    // Only auto-set if teamTabSelected is still "all" and no saved ui_state
    const prof = profile;
    if (prof && prof.ui_state && prof.ui_state.teamTabSelected) return; // already restored
    // Find first team this user belongs to
    const myTeam = teams.find(t => (teamMembers[t.id]||[]).some(m=>m.user_id===user.id));
    if (myTeam) setTeamTabSelected(myTeam.id);
    // else stays "all"
  },[teams]);

  const loadUser = async (u) => {
    try {
      const {data:prof}=await sb.from("profiles").select("*").eq("id",u.id).single();
      setUser(u); setProfile(prof);
      await loadData(u,prof);
      // Restore UI state
      if (prof && prof.ui_state && Object.keys(prof.ui_state).length > 0) {
        const s = prof.ui_state;
        if (s.tab) setTab(s.tab);
        if (s.pipelineFilter) setPipelineFilter(s.pipelineFilter);
        if (s.statsTimeFilter) setStatsTimeFilter(s.statsTimeFilter);
        if (s.statsCustomRange) setStatsCustomRange({
          start: new Date(s.statsCustomRange.start),
          end: new Date(s.statsCustomRange.end)
        });
        if (s.statsTeamId) setStatsTeamId(s.statsTeamId);
        if (s.statsRepSearch) setStatsRepSearch(s.statsRepSearch);
        if (s.statsRepId) setStatsRepId(s.statsRepId);
        if (s.recruitsFilter) setRecruitsFilter(s.recruitsFilter);
        // Team tab: use saved value or auto-assign to user's first team
        if (s.teamTabSelected) {
          setTeamTabSelected(s.teamTabSelected);
        }
      } else {
        // First login — auto-assign team tab to user's first team
        // We'll handle this after teams load in a useEffect
      }
    } catch(e) {
      console.error("loadUser error:",e);
    } finally {
      setLoading(false);
    }
  };

  const loadData = async (u, prof) => {
    try {
      const p=prof||profile;
      const isPrivileged = p && (p.role==="manager" || u.id===OWNER_ID);
      if (isPrivileged) {
        const [leadsRes,profilesRes,teamsRes,membersRes,goalsRes] = await Promise.all([
          sb.from("leads").select("id,owner_id,name,address,phone,email,appointment,utility,esiid,meter,usage_input,notes,stage,bill_retrieved,autopay_input,knew_solar,closer_inside,decision_makers,contact_status,soft_solid,confirmed,is_arc,arc_stage,ac_checklist,follow_up_agreed,follow_up_date,gcal_event_id,history,created_at,updated_at").order("created_at",{ascending:false}),
          sb.from("profiles").select("*"),
          sb.from("teams").select("*").order("created_at",{ascending:false}),
          sb.from("team_members").select("*"),
          sb.from("team_goals").select("*"),
        ]);
        if(leadsRes.error) console.error("leads error:",leadsRes.error);
        if(profilesRes.error) console.error("profiles error:",profilesRes.error);
        if(teamsRes.error) console.error("teams error:",teamsRes.error);
        if(membersRes.error) console.error("members error:",membersRes.error);
        if(goalsRes.error) console.error("goals error:",goalsRes.error);
        setLeads(leadsRes.data||[]);
        setProfiles(profilesRes.data||[]);
        setTeams(teamsRes.data||[]);
        const grouped={};
        (membersRes.data||[]).forEach(m=>{
          if(!grouped[m.team_id])grouped[m.team_id]=[];
          grouped[m.team_id].push(m);
        });
        setTeamMembers(grouped);
        const goalsGrouped={};
        (goalsRes.data||[]).forEach(g=>{
          if(!goalsGrouped[g.team_id])goalsGrouped[g.team_id]={};
          goalsGrouped[g.team_id][g.period]=g;
        });
        setTeamGoals(goalsGrouped);
      } else {
        const [leadsRes,profilesRes,teamsRes,membersRes,goalsRes] = await Promise.all([
          sb.from("leads").select("id,owner_id,name,address,phone,email,appointment,utility,esiid,meter,usage_input,notes,stage,bill_retrieved,autopay_input,knew_solar,closer_inside,decision_makers,contact_status,soft_solid,confirmed,is_arc,arc_stage,ac_checklist,follow_up_agreed,follow_up_date,gcal_event_id,history,created_at,updated_at").eq("owner_id",u.id).order("created_at",{ascending:false}),
          sb.from("profiles").select("*"),
          sb.from("teams").select("*").order("created_at",{ascending:false}),
          sb.from("team_members").select("*"),
          sb.from("team_goals").select("*"),
        ]);
        if(leadsRes.error) console.error("leads error:",leadsRes.error);
        if(profilesRes.error) console.error("profiles error:",profilesRes.error);
        if(teamsRes.error) console.error("teams error:",teamsRes.error);
        if(membersRes.error) console.error("members error:",membersRes.error);
        if(goalsRes.error) console.error("goals error:",goalsRes.error);
        setLeads(leadsRes.data||[]);
        setProfiles(profilesRes.data||[]);
        setTeams(teamsRes.data||[]);
        const grouped={};
        (membersRes.data||[]).forEach(m=>{
          if(!grouped[m.team_id])grouped[m.team_id]=[];
          grouped[m.team_id].push(m);
        });
        setTeamMembers(grouped);
        const goalsGrouped={};
        (goalsRes.data||[]).forEach(g=>{
          if(!goalsGrouped[g.team_id])goalsGrouped[g.team_id]={};
          goalsGrouped[g.team_id][g.period]=g;
        });
        setTeamGoals(goalsGrouped);
      }
    } catch(e) {
      console.error("loadData error:",e);
    }
  };

  // ── Persist UI state to Supabase ─────────────────────────────────
  const saveUIState = async (patch) => {
    if (!user) return;
    await sb.from("profiles").update({ ui_state: patch }).eq("id", user.id);
  };

  const buildUIState = (overrides={}) => ({
    tab: overrides.tab ?? tab,
    pipelineFilter: overrides.pipelineFilter ?? pipelineFilter,
    teamTabSelected: overrides.teamTabSelected ?? teamTabSelected,
    statsTimeFilter: overrides.statsTimeFilter ?? statsTimeFilter,
    statsCustomRange: overrides.statsCustomRange ?? (statsCustomRange ? {
      start: statsCustomRange.start.toISOString(),
      end: statsCustomRange.end.toISOString()
    } : null),
    statsTeamId: overrides.statsTeamId ?? statsTeamId,
    statsRepSearch: overrides.statsRepSearch ?? statsRepSearch,
    statsRepId: overrides.statsRepId ?? statsRepId,
    recruitsFilter: overrides.recruitsFilter ?? recruitsFilter,
  });

  const saveLead = async (form) => {
    // Determine owner: if viewing a specific rep's pipeline, add lead for that rep
    let ownerId=user.id;
    if(pipelineFilter.startsWith("rep:")){ownerId=pipelineFilter.replace("rep:","");}
    const existing=modal.lead&&modal.lead.id?leads.find(l=>l.id===modal.lead.id):null;
    const changes=[];
    if(existing){
      const fields={name:"Name",address:"Address",phone:"Phone",email:"Email",appointment:"Appointment",utility:"Utility",esiid:"ESIID",meter:"Meter",notes:"Notes",stage:"Stage",is_arc:"ARC Status"};
      for(const [key,label] of Object.entries(fields)){if((existing[key]||"")!==(form[key]||""))changes.push(`${label}: "${existing[key]||"-"}" to "${form[key]||"-"}"`);}
      const pc=(existing.bill_photos||[]).length,nc=(form.billPhotos||[]).length;
      if(nc>pc)changes.push(`Photos: Added ${nc-pc}`);else if(nc<pc)changes.push(`Photos: Removed ${pc-nc}`);
    }
    const author=(profile&&(profile.name||profile.email))||(user&&user.email)||"Unknown";
    const newHistory=existing?(changes.length>0?[{ts:formatTs(),by:author,changes},...(existing.history||[])]:(existing.history||[])):[{ts:formatTs(),by:author,changes:["Lead created"]}];
    // Split payload — save bill_photos separately only if changed (they're huge)
    const existingPhotos = modal.lead?.bill_photos || [];
    const newPhotos = form.billPhotos || [];
    const photosChanged = JSON.stringify(existingPhotos) !== JSON.stringify(newPhotos);

    const payload={name:form.name||"",address:form.address||"",phone:form.phone||"",email:form.email||"",appointment:form.appointment||"",gcal_event_id:form.gcal_event_id||null,utility:form.utility||"",usage_input:form.usageInput||"",esiid:form.esiid||"",meter:form.meter||"",notes:form.notes||"",stage:form.stage||STAGES[0],bill_retrieved:form.billRetrieved||"",autopay_input:form.autopayInput||"",knew_solar:form.knewSolar||"",closer_inside:form.closerInside||"",decision_makers:form.decisionMakers||"",contact_status:form.contactStatus||"",soft_solid:form.softSolid||"",confirmed:form.confirmed||"",is_arc:form.isArc||false,arc_stage:form.isArc?(form.arcStage||form.stage):null,ac_checklist:form.acChecklist||[],follow_up_agreed:form.followUpAgreed||"",follow_up_date:form.followUpDate||"",history:newHistory,updated_at:new Date().toISOString()};

    let viewId;
    const isUpdate = !!(modal.lead && modal.lead.id);
    if(isUpdate){
      viewId=modal.lead.id;
    } else {
      viewId=generateId();
    }

    // Build the full lead object for local state so the view opens instantly
    const localLead = isUpdate
      ? {...(existing||{}), ...payload, id:viewId, bill_photos:newPhotos}
      : {...payload, id:viewId, owner_id:ownerId, created_at:new Date().toISOString(), bill_photos:newPhotos};

    // Optimistically update local state
    setLeads(ls=>{
      const idx=ls.findIndex(l=>l.id===viewId);
      if(idx>=0){const copy=[...ls];copy[idx]={...copy[idx],...localLead};return copy;}
      return [localLead,...ls];
    });

    // Close edit modal and open view mode immediately — no network wait
    setModal({open:false,lead:null});
    setDetailId(viewId);

    // Persist to the database in the background
    (async()=>{
      try{
        if(isUpdate){
          await sb.from("leads").update(payload).eq("id",viewId);
          if(photosChanged) await sb.from("leads").update({bill_photos:newPhotos}).eq("id",viewId);
        } else {
          await sb.from("leads").insert({...payload,bill_photos:newPhotos,id:viewId,owner_id:ownerId,created_at:new Date().toISOString()});
        }
        await loadData(user,profile);
      }catch(err){
        console.error("Save failed:",err);
      }
    })();
  };

  const deleteLead=async(id)=>{
    // Find the lead to get its address
    const lead = leads.find(l=>l.id===id);
    await sb.from("leads").delete().eq("id",id);
    // Clear lead disposition on any matching canvass pin
    if(lead&&lead.address){
      const {data:matchingHomes} = await sb.from("canvass_homes")
        .select("id,address")
        .eq("prescreen","lead");
      if(matchingHomes){
        const toUpdate = matchingHomes.filter(h=>
          h.address&&h.address.toLowerCase().includes(lead.address.split(",")[0].toLowerCase().trim())
        );
        for(const h of toUpdate){
          await sb.from("canvass_homes").update({prescreen:null,updated_at:new Date().toISOString()}).eq("id",h.id);
        }
      }
    }
    await loadData(user,profile);
  };

  const handleStageChange=async(id,newStage)=>{
    const lead=leads.find(l=>l.id===id);if(!lead)return;
    const entry={ts:formatTs(),by:(profile&&(profile.name||profile.email))||(user&&user.email)||"Unknown",changes:[`Stage: "${lead.stage}" to "${newStage}"`]};
    await sb.from("leads").update({stage:newStage,history:[entry,...(lead.history||[])],updated_at:new Date().toISOString()}).eq("id",id);
    setLeads(ls=>ls.map(l=>l.id===id?{...l,stage:newStage,history:[entry,...(l.history||[])]}:l));
  };

  const handleTransfer=async(leadId,toRepId)=>{
    const lead=leads.find(l=>l.id===leadId),toRep=profiles.find(p=>p.id===toRepId);
    const entry={ts:formatTs(),by:(profile&&(profile.name||profile.email))||(user&&user.email)||"Unknown",changes:[`Transferred to ${toRep?toRep.name:"rep"}`]};
    await sb.from("leads").update({owner_id:toRepId,history:[entry,...(lead?lead.history||[]:[])],updated_at:new Date().toISOString()}).eq("id",leadId);
    await loadData(user,profile);
  };

  const handleSignOut=async()=>{await sb.auth.signOut();setUser(null);setProfile(null);setLeads([]);};

  // Save UI state to Supabase whenever anything changes
  useEffect(()=>{
    if (!user) return;
    const state = {
      tab,
      pipelineFilter,
      teamTabSelected,
      statsTimeFilter,
      statsCustomRange: statsCustomRange ? {
        start: statsCustomRange.start.toISOString(),
        end: statsCustomRange.end.toISOString()
      } : null,
      statsTeamId,
      statsRepSearch,
      statsRepId,
      recruitsFilter,
    };
    // Debounce — don't hammer Supabase on every keystroke
    const timer = setTimeout(()=>{
      sb.from("profiles").update({ui_state:state}).eq("id",user.id);
    }, 800);
    return ()=>clearTimeout(timer);
  },[tab,pipelineFilter,teamTabSelected,statsTimeFilter,statsCustomRange,statsTeamId,statsRepSearch,statsRepId,recruitsFilter]);

  if(loading)return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e293b)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:18}}>
      <style>{`@keyframes ppspin{to{transform:rotate(360deg)}}`}</style>
      <div style={{width:46,height:46,borderRadius:"50%",border:"4px solid rgba(255,255,255,0.18)",borderTopColor:"#f97316",animation:"ppspin 0.8s linear infinite"}}/>
      <div style={{color:"#fff",fontSize:16,fontWeight:600}}>Loading...</div>
    </div>
  );

  if(!user||!profile)return<AuthScreen onAuth={(u,p)=>{setUser(u);setProfile(p);loadData(u,p);}}/>;

  const isOwner = user.id===OWNER_ID;
  const isPrivileged = profile.role==="manager" || isOwner;

  // ── Pipeline sub-tabs: mine | team:{id} | rep:{id} ──────────────
  // pipelineFilter state already declared at top

  // Which teams are visible to this user
  const visibleTeams = isOwner ? teams : teams.filter(t=>{
    const ms=teamMembers[t.id]||[];
    return ms.some(m=>m.user_id===user.id) || t.created_by===user.id;
  });

  // Active team for "Team" sub-tab (default to first visible team)
  const activeTeamId = (()=>{
    if (pipelineFilter.startsWith("team:")) return pipelineFilter.replace("team:","");
    return visibleTeams.length>0 ? visibleTeams[0].id : "";
  })();

  // Active rep for "Reps" sub-tab
  const activeRepId = pipelineFilter.startsWith("rep:") ? pipelineFilter.replace("rep:","") : "";

  // Reps visible to this user
  const visibleReps = isOwner
    ? profiles.filter(p=>p.id!==user.id&&(p.role==="rep"||p.role==="manager"))
    : profiles.filter(p=>{
        if (p.id===user.id) return false;
        return visibleTeams.some(t=>(teamMembers[t.id]||[]).some(m=>m.user_id===p.id));
      });

  // Which sub-tab is active: "mine" | "team" | "rep"
  const pipelineSubTab = pipelineFilter==="mine" ? "mine"
    : pipelineFilter==="all" ? "all"
    : pipelineFilter.startsWith("team:") ? "team"
    : pipelineFilter.startsWith("rep:") ? "rep"
    : "mine";

  // Compute visible leads
  const getVisibleLeads = () => {
    if (pipelineFilter==="mine") return leads.filter(l=>l.owner_id===user.id);
    if (pipelineFilter==="all") return leads;
    if (pipelineFilter.startsWith("team:")) {
      const teamId=pipelineFilter.replace("team:","");
      const memberIds=(teamMembers[teamId]||[]).map(m=>m.user_id);
      return leads.filter(l=>memberIds.includes(l.owner_id));
    }
    if (pipelineFilter.startsWith("rep:")) {
      const repId=pipelineFilter.replace("rep:","");
      return leads.filter(l=>l.owner_id===repId);
    }
    return leads.filter(l=>l.owner_id===user.id);
  };
  const visibleLeads = getVisibleLeads();

  const vaultLeads = (()=>{
    if (isOwner) return leads;
    if (isPrivileged) { // manager: own leads + their teams' members' leads
      const myTeamIds = (teams||[]).filter(t=>(teamMembers[t.id]||[]).some(m=>m.user_id===user.id)).map(t=>t.id);
      const memberIds = new Set([user.id]);
      myTeamIds.forEach(tid=>(teamMembers[tid]||[]).forEach(m=>memberIds.add(m.user_id)));
      return leads.filter(l=>memberIds.has(l.owner_id));
    }
    return leads.filter(l=>l.owner_id===user.id); // rep
  })();

  const repProfiles=profiles.filter(p=>p.role==="rep"&&p.id!==user.id);
  const detailLead=leads.find(l=>l.id===detailId)||null;

  const tabs=[
    ["pipeline","Pipeline"],
    ["recruits","Recruits"],
    ...((teamMembers["b1f166c3-661e-4e02-b839-3b9560c9237b"]||[]).some(m=>m.user_id===user.id)||isOwner?[["calendar","Calendar"]]:[[]]),
    ["canvass","Canvass"],
    ["stats","Stats"],
    ["team","Team"],
    ["vault","Vault"]
  ];

  return (
    <DarkCtx.Provider value={dark}>
    <div style={{minHeight:"100vh",background:dark?"#0f172a":"#f5ede0",display:"flex",flexDirection:"column"}}>
      {(pullDist>0 || refreshing) && (
        <div style={{position:"fixed",top:0,left:0,right:0,display:"flex",alignItems:"flex-start",justifyContent:"center",height:refreshing?54:pullDist,zIndex:400,pointerEvents:"none",overflow:"hidden",transition:refreshing?"height 0.2s ease":"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,background:"rgba(26,36,86,0.96)",borderRadius:99,padding:"8px 16px",boxShadow:"0 4px 16px rgba(0,0,0,0.3)",marginTop:10,color:"#fff"}}>
            <span style={{width:15,height:15,borderRadius:"50%",border:"2px solid rgba(255,255,255,0.35)",borderTopColor:"#fff",display:"inline-block",animation:refreshing?"spin 0.7s linear infinite":"none",transform:refreshing?"none":`rotate(${Math.min(pullDist/70,1)*270}deg)`}}/>
            <span style={{fontSize:13,fontWeight:700}}>{refreshing?"Refreshing…":(pullDist>=70?"Release to refresh":"Pull to refresh")}</span>
          </div>
        </div>
      )}
      <div style={{background:"linear-gradient(135deg,#1a2456,#2d1f3d)",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 2px 12px rgba(0,0,0,0.2)"}}>

        )}
        {tab==="calendar"&&((teamMembers["b1f166c3-661e-4e02-b839-3b9560c9237b"]||[]).some(m=>m.user_id===user.id)||isOwner)&&(
          <CalendarView newEventUrl={calendarEventUrl} onEventUrlUsed={()=>setCalendarEventUrl(null)}/>
        )}
        {tab==="canvass"&&(
          <CanvassTab gmapsKey="AIzaSyCvNBb2HPuzSCV7Ml53uvITXw2GSvCISdU"
            leads={(()=>{
              const filters = Array.isArray(canvassLeadFilter)?canvassLeadFilter:[canvassLeadFilter||"mine"];
              if(filters.includes("all")) return leads;
              const allowed = new Set();
              filters.forEach(f=>{
                if(f==="mine") leads.filter(l=>l.owner_id===user.id).forEach(l=>allowed.add(l.id));
                else if(f.startsWith("team:")){
                  const tid=f.replace("team:","");
                  const membersList=teamMembers&&teamMembers[tid]?teamMembers[tid]:[];
                  if(membersList.length===0){console.log("No members - skipping");return;}
                  const memberIds=membersList.map(m=>m.user_id);
                  leads.filter(l=>memberIds.includes(l.owner_id)).forEach(l=>allowed.add(l.id));
                } else if(f.startsWith("rep:")){
                  const rid=f.replace("rep:","");
                  leads.filter(l=>l.owner_id===rid).forEach(l=>allowed.add(l.id));
                }
              });
              const result = leads.filter(l=>allowed.has(l.id));
              return result;
            })()}
            canvassLeadFilter={canvassLeadFilter}
            setCanvassLeadFilter={setCanvassLeadFilter}
            currentUser={{...user, name:profile?.name}}
            isOwner={isOwner}
            teams={teams}
            teamMembers={teamMembers}
            profiles={profiles}
            allowedOwnerIds={(()=>{
              const filters=Array.isArray(canvassLeadFilter)?canvassLeadFilter:[canvassLeadFilter||"mine"];
              if(filters.includes("all")) return null; // null = show all
              const ids=new Set();
              filters.forEach(f=>{
                if(f==="mine") ids.add(user.id);
                else if(f.startsWith("team:")){
                  const tid=f.replace("team:","");
                  (teamMembers[tid]||[]).forEach(m=>ids.add(m.user_id));
                } else if(f.startsWith("rep:")){
                  ids.add(f.replace("rep:",""));
                }
              });
              return ids;
            })()} onCreateLead={(home, existingLead)=>{
  setTab("pipeline");
  setTimeout(()=>{
    if(existingLead){
      // Open existing lead in detail view
      setDetailId(existingLead.id);
    } else {
      // Open add lead form pre-filled from canvass
      setModal({open:true,lead:{name:home.owner_name||"",address:home.address||"",phone:home.phone||"",email:home.email||"",notes:home.notes||""}});
    }
  },100);
}} onStageChange={(leadId,newStage,entry)=>setLeads(ls=>ls.map(l=>l.id===leadId?{...l,stage:newStage,history:[entry,...(l.history||[])]}:l))}/>
        )}
        {tab==="stats"&&(
          <StatsErrorBoundary>
          <StatsView leads={leads} profiles={profiles} currentUser={profile} teams={teams} teamMembers={teamMembers}
            timeFilter={statsTimeFilter} setTimeFilter={setStatsTimeFilter}
            customRange={statsCustomRange} setCustomRange={setStatsCustomRange}
            selectedTeamId={statsTeamId} setSelectedTeamId={setStatsTeamId}
            repSearch={statsRepSearch} setRepSearch={setStatsRepSearch}
            selectedRepId={statsRepId} setSelectedRepId={setStatsRepId}/>
          </StatsErrorBoundary>
        )}
        {tab==="team"&&(
          <TeamManagement currentUser={{...profile,id:user.id}} profiles={profiles} leads={leads} teams={teams} teamMembers={teamMembers} teamGoals={teamGoals} setTeamGoals={setTeamGoals} onDataRefresh={async ()=>{ await loadData(user,profile); }} selectedTeamId={teamTabSelected} setSelectedTeamId={setTeamTabSelected}/>
        )}
        {tab==="vault"&&(
          <VaultView currentUser={profile} userId={user.id} isOwner={isOwner} isPrivileged={isPrivileged} dark={dark} leads={vaultLeads}/>
        )}
      </div>

      <LeadModal open={modal.open} onClose={()=>setModal({open:false,lead:null})} onSave={saveLead} gmapsKey="AIzaSyCvNBb2HPuzSCV7Ml53uvITXw2GSvCISdU"
        creatorName={(()=>{ const o = modal.lead && modal.lead.owner_id ? profiles.find(p=>p.id===modal.lead.owner_id) : null; return (o && (o.name||o.email)) || (profile && (profile.name||profile.email)) || (user && user.email) || ""; })()}
        initial={modal.lead?{...modal.lead,email:modal.lead.email||"",utility:modal.lead.utility||"",usageInput:modal.lead.usage_input||"",billPhotos:modal.lead.bill_photos||[],billRetrieved:modal.lead.bill_retrieved||"",autopayInput:modal.lead.autopay_input||"",knewSolar:modal.lead.knew_solar||"",closerInside:modal.lead.closer_inside||"",decisionMakers:modal.lead.decision_makers||"",contactStatus:modal.lead.contact_status||"",softSolid:modal.lead.soft_solid||"",confirmed:modal.lead.confirmed||"",isArc:modal.lead.is_arc||false,arcStage:modal.lead.arc_stage||"",acChecklist:modal.lead.ac_checklist||[],followUpAgreed:modal.lead.follow_up_agreed||"",followUpDate:modal.lead.follow_up_date||""}:null}/>

      {detailId&&(
        <DetailModal lead={detailLead} onClose={()=>setDetailId(null)}
          onEdit={l=>{setDetailId(null);setModal({open:true,lead:l});}}
          onDelete={id=>{deleteLead(id);setDetailId(null);}}
          repProfiles={repProfiles} onTransfer={handleTransfer} profiles={profiles}
          onUpdate={updated=>{
            setLeads(ls=>ls.map(l=>l.id===updated.id?{...l,...updated}:l));
            // Also update modal.lead if it's open for this lead
            setModal(m=>m.open&&m.lead?.id===updated.id?{...m,lead:{...m.lead,...updated}}:m);
          }}
          onViewInCanvass={lead=>{
            setDetailId(null);
            setTab("canvass");
            window._canvassJumpLead=lead;
          }}/>
      )}

      <HamburgerDrawer
        open={drawerOpen}
        onClose={()=>setDrawerOpen(false)}
        user={user}
        profile={profile}
        setProfile={setProfile}
        teams={teams}
        teamMembers={teamMembers}
        dark={dark}
        setDark={setDark}
        onSignOut={handleSignOut}
        isOwner={isOwner}
        unreadTickets={unreadTickets}
        onTicketRead={(count)=>setUnreadTickets(typeof count==="number"?count:0)}
      />
    </div>
    </DarkCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
// Dismiss splash once React has painted
requestAnimationFrame(()=>{
  requestAnimationFrame(()=>{
    const s=document.getElementById("splash");
    if(s){s.classList.add("fade");setTimeout(()=>{s.style.display="none";},450);}
  });
});
</script>
</body>
</html>
