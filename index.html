// ── Canvass View Picker ───────────────────────────────────────────────
function CanvassViewPicker({isOwner, isPrivileged, visibleTeams, repProfiles, canvassLeadFilter, setCanvassLeadFilter}) {
  const [open, setOpen] = React.useState(false);
  const [showTeams, setShowTeams] = React.useState(false);
  const [showReps, setShowReps] = React.useState(false);
  const [teamSearch, setTeamSearch] = React.useState("");
  const [repSearch, setRepSearch] = React.useState("");

  // canvassLeadFilter is now an array for multi-select
  const filters = Array.isArray(canvassLeadFilter) ? canvassLeadFilter : [canvassLeadFilter||"mine"];
  const toggle = (key) => {
    if(key==="mine"||key==="all"){
      setCanvassLeadFilter([key]);
    } else {
      const cur = Array.isArray(canvassLeadFilter)?canvassLeadFilter:[canvassLeadFilter||"mine"];
      const withoutSpecial = cur.filter(k=>k!=="mine"&&k!=="all");
      if(withoutSpecial.includes(key)){
        const next = withoutSpecial.filter(k=>k!==key);
        setCanvassLeadFilter(next.length?next:["mine"]);
      } else {
        setCanvassLeadFilter([...withoutSpecial, key]);
      }
    }
  };

  const label = ()=>{
    if(filters.includes("all")) return "All Reps";
    if(filters.length===1&&filters[0]==="mine") return "My Leads";
    if(filters.length===1&&filters[0].startsWith("team:")){
      const t=visibleTeams.find(t=>"team:"+t.id===filters[0]);
      return t?t.name:"Team";
    }
    if(filters.length===1&&filters[0].startsWith("rep:")){
      const p=repProfiles.find(p=>"rep:"+p.id===filters[0]);
      return p?p.name:"Rep";
    }
    return `${filters.length} selected`;
  };

  const filteredTeams = visibleTeams.filter(t=>(t.name||"").toLowerCase().includes(teamSearch.toLowerCase()));
  const filteredReps = repProfiles.filter(p=>(p.name||"").toLowerCase().includes(repSearch.toLowerCase()));

  const Row = ({fkey, icon, label: lbl}) => {
    const on = filters.includes(fkey);
    return(
      <div onClick={()=>toggle(fkey)}
        style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",cursor:"pointer",background:on?"rgba(107,45,78,0.3)":"transparent",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
        <span style={{fontSize:15}}>{icon}</span>
        <span style={{flex:1,fontSize:13,color:on?"#fff":"rgba(255,255,255,0.6)",fontWeight:on?700:400}}>{lbl}</span>
        <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${on?"#6b2d4e":"rgba(255,255,255,0.2)"}`,background:on?"#6b2d4e":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
          {on&&<span style={{color:"#fff",fontSize:11,fontWeight:800}}>✓</span>}
        </div>
      </div>
    );
  };

  return(
    <div style={{position:"absolute",top:12,right:12,zIndex:400}}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{width:48,height:48,borderRadius:12,background:filters.length>1||!filters.includes("mine")?"rgba(107,45,78,0.9)":"rgba(20,20,30,0.85)",border:filters.length>1||!filters.includes("mine")?"2px solid #6b2d4e":"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.4)",backdropFilter:"blur(4px)"}}>
        <span style={{fontSize:20}}>🦅</span>
      </button>

      {open&&(
        <div style={{position:"absolute",top:0,right:"calc(100% + 8px)",background:"rgba(18,18,28,0.97)",borderRadius:14,width:260,maxHeight:"70vh",overflowY:"auto",boxShadow:"-8px 8px 30px rgba(0,0,0,0.5)",border:"1px solid rgba(255,255,255,0.1)"}}>
          <div style={{padding:"12px 14px",borderBottom:"1px solid rgba(255,255,255,0.08)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,fontWeight:800,color:"#fff"}}>Viewing Leads</span>
            <button onClick={()=>{setCanvassLeadFilter(["mine"]);setOpen(false);}} style={{background:"none",border:"none",color:"rgba(255,255,255,0.4)",fontSize:11,cursor:"pointer"}}>Reset</button>
          </div>

          <Row fkey="mine" icon="👤" label="My Leads"/>
          {isOwner&&<Row fkey="all" icon="🌐" label="All Reps"/>}

          {isPrivileged&&visibleTeams.length>0&&(
            <div>
              <div onClick={()=>setShowTeams(s=>!s)}
                style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.05)",background:"rgba(255,255,255,0.03)"}}>
                <span style={{fontSize:15}}>👥</span>
                <span style={{flex:1,fontSize:13,color:"rgba(255,255,255,0.7)",fontWeight:600}}>Teams</span>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{showTeams?"▲":"▼"}</span>
              </div>
              {showTeams&&(
                <div>
                  <div style={{padding:"8px 12px"}}>
                    <input value={teamSearch} onChange={e=>setTeamSearch(e.target.value)}
                      placeholder="Search teams..."
                      style={{width:"100%",padding:"6px 10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.07)",color:"#fff",fontSize:12,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
                  </div>
                  {filteredTeams.map(t=><Row key={t.id} fkey={"team:"+t.id} icon="👥" label={t.name}/>)}
                </div>
              )}
            </div>
          )}

          {isPrivileged&&repProfiles.length>0&&(
            <div>
              <div onClick={()=>setShowReps(s=>!s)}
                style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.05)",background:"rgba(255,255,255,0.03)"}}>
                <span style={{fontSize:15}}>🧑</span>
                <span style={{flex:1,fontSize:13,color:"rgba(255,255,255,0.7)",fontWeight:600}}>Reps</span>
                <span style={{fontSize:10,color:"rgba(255,255,255,0.4)"}}>{showReps?"▲":"▼"}</span>
              </div>
              {showReps&&(
                <div>
                  <div style={{padding:"8px 12px"}}>
                    <input value={repSearch} onChange={e=>setRepSearch(e.target.value)}
                      placeholder="Search reps..."
                      style={{width:"100%",padding:"6px 10px",borderRadius:8,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.07)",color:"#fff",fontSize:12,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
                  </div>
                  {filteredReps.map(p=><Row key={p.id} fkey={"rep:"+p.id} icon="🧑" label={p.name||p.email}/>)}
                </div>
              )}
            </div>
          )}
        </div>
      )}
      {open&&<div style={{position:"fixed",inset:0,zIndex:-1}} onClick={()=>setOpen(false)}/>}
    </div>
  );
}

// ── Canvass Tab ───────────────────────────────────────────────────────
function CanvassTab({gmapsKey, leads, onCreateLead, onStageChange, canvassLeadFilter, setCanvassLeadFilter, currentUser, isOwner, teams, teamMembers, profiles, allowedOwnerIds}) {
  const myProfile = profiles&&currentUser ? profiles.find(p=>p.id===currentUser.id) : null;
  const isManager = myProfile&&myProfile.role==="manager";
  const isPrivileged = isOwner||isManager;
  const visibleTeams = isOwner ? (teams||[]) : (teams||[]).filter(t=>{
    const ms=(teamMembers&&teamMembers[t.id])||[];
    return ms.some(m=>m.user_id===currentUser?.id)||t.created_by===currentUser?.id;
  });
  const repProfiles = (profiles||[]).filter(p=>p.role==="rep"&&p.id!==currentUser?.id);
  const [mapLoaded, setMapLoaded] = React.useState(false);
  const [mapError, setMapError] = React.useState(null);
  const [homes, setHomes] = React.useState([]);
  const [selectedHome, setSelectedHome] = React.useState(null);
  const [showAddForm, setShowAddForm] = React.useState(false);
  const [addForm, setAddForm] = React.useState({address:"",ownerName:"",phone:"",prescreen:"",notes:""});
  const [geocoding, setGeocoding] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  const [satellite, setSatellite] = React.useState(()=>localStorage.getItem("canvass_satellite")!=="false");
  const [showBuildings, setShowBuildings] = React.useState(true);
  const [locating, setLocating] = React.useState(false);
  const myLocationMarkerRef = React.useRef(null);
  const [showFilter, setShowFilter] = React.useState(false);
  const [activeFilters, setActiveFilters] = React.useState([]); // empty = show all
  const buildingMarkersRef = React.useRef([]);
  const homesRef = React.useRef([]);
  const lastBuildingFetchRef = React.useRef(null);
  const [searchVal, setSearchVal] = React.useState("");
  const [suggestions, setSuggestions] = React.useState([]);
  const [showSuggestions, setShowSuggestions] = React.useState(false);
  const autocompleteRef = React.useRef(null);
  const searchDebounceRef = React.useRef(null);
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  const markersRef = React.useRef([]);
  const leadMarkersRef = React.useRef([]);
  const leadGenRef = React.useRef(0); // cancel stale geocoding
  const [jumpLead, setJumpLead] = React.useState(null);

  const PRESCREEN_COLORS = {yes:"#10b981",maybe:"#f59e0b",no:"#ef4444",no_answer:"#94a3b8","":" #1a2456"};

  React.useEffect(()=>{
    if(window.google&&window.google.maps){setMapLoaded(true);return;}
    if(document.getElementById("gmaps-script")){
      const check=setInterval(()=>{if(window.google&&window.google.maps){setMapLoaded(true);clearInterval(check);}},200);
      return ()=>clearInterval(check);
    }
    const script=document.createElement("script");
    script.id="gmaps-script";
    script.src=`https://maps.googleapis.com/maps/api/js?key=${gmapsKey}&libraries=places`;
    script.async=true;
    script.onload=()=>setMapLoaded(true);
    script.onerror=()=>setMapError("Failed to load Google Maps. Check your API key.");
    document.head.appendChild(script);
  },[]);

  React.useEffect(()=>{ loadHomes(); },[]);
  // Keep homesRef in sync with homes state
  React.useEffect(()=>{ homesRef.current=homes; },[homes]);

  // Watch for jump requests from pipeline
  React.useEffect(()=>{
    if(!mapLoaded) return;
    const checkJump = () => {
      if(window._canvassJumpLead){
        const lead = window._canvassJumpLead;
        window._canvassJumpLead = null;
        setJumpLead(lead);
      }
    };
    // Check immediately and after short delay
    checkJump();
    const t1 = setTimeout(checkJump, 200);
    const t2 = setTimeout(checkJump, 600);
    return ()=>{clearTimeout(t1);clearTimeout(t2);};
  },[mapLoaded]);

  // Execute jump when jumpLead is set
  React.useEffect(()=>{
    if(!jumpLead||!mapLoaded||!mapInstanceRef.current) return;
    const lead = jumpLead;
    setJumpLead(null);
    if(!lead.address) return;
    geocodeAddress(lead.address).then(coords=>{
      if(!coords) return;
      // Cancel any pending auto-locate
      window._autoLocateId = null;
      mapInstanceRef.current.panTo(coords);
      mapInstanceRef.current.setZoom(18);
      const saved = homesRef.current.find(h=>
        h.address&&h.address.toLowerCase().includes(lead.address.split(",")[0].toLowerCase().trim())
      );
      if(saved){
        setSelectedHome(saved);
      } else {
        setSelectedHome({
          id:null,_isPipelineLead:true,_leadId:lead.id,
          address:lead.address,owner_name:lead.name||"",
          phone:lead.phone||"",notes:lead.notes||"",
          prescreen:"lead",lat:coords.lat,lng:coords.lng
        });
      }
    });
  },[jumpLead,mapLoaded]);

  const loadHomes=async()=>{
    try{
      const {data}=await sb.from("canvass_homes").select("*").order("created_at",{ascending:false});
      setHomes(data||[]);
      homesRef.current=data||[];
    }catch(e){console.error("Canvass load error:",e);}
  };

  React.useEffect(()=>{
    if(!mapLoaded||!mapRef.current||mapInstanceRef.current)return;
    try{
      const savedSat = localStorage.getItem("canvass_satellite")!=="false";
      const map = new window.google.maps.Map(mapRef.current,{
        center:{lat:32.7767,lng:-96.7970},
        zoom:12,
        mapTypeId:savedSat?"satellite":"roadmap",
        streetViewControl:false,
        mapTypeControl:false,
        fullscreenControl:false,
        gestureHandling:"greedy",
      });
      mapInstanceRef.current=map;
      // Auto-zoom to user location — only if no jump is pending
      // Use a flag so the async callback can be cancelled
      if(navigator.geolocation){
        const autoLocateId = Symbol();
        window._autoLocateId = autoLocateId;
        navigator.geolocation.getCurrentPosition(
          (pos)=>{
            // Cancel if a jump came in or another locate started
            if(window._canvassJumpLead || window._autoLocateId !== autoLocateId) return;
            const coords={lat:pos.coords.latitude,lng:pos.coords.longitude};
            map.panTo(coords);
            map.setZoom(18);
            setTimeout(()=>placeMyLocationMarker(coords), 500);
          },
          ()=>{},
          {enableHighAccuracy:true,timeout:6000}
        );
      }
    }catch(e){setMapError("Map init failed: "+e.message);}
  },[mapLoaded]);

  // Fetch buildings when map idles (stops moving) if buildings are enabled
  React.useEffect(()=>{
    if(!mapLoaded||!mapInstanceRef.current||!window.google) return;
    const listener = window.google.maps.event.addListener(
      mapInstanceRef.current, "idle", ()=>{ if(showBuildings&&activeFilters.length===0) fetchBuildings(); }
    );
    return ()=>window.google.maps.event.removeListener(listener);
  },[mapLoaded, showBuildings, activeFilters]);

  // Apply filters to markers whenever activeFilters changes
  React.useEffect(()=>{
    if(!mapInstanceRef.current||!window.google) return;
    const hasFilter = activeFilters.length > 0;

    // Filter disposition markers (canvass homes)
    markersRef.current.forEach(m=>{
      const home = homes.find(h=>{
        if(!h.lat||!h.lng) return false;
        const pos=m.getPosition();
        return pos&&Math.abs(pos.lat()-parseFloat(h.lat))<0.0003&&Math.abs(pos.lng()-parseFloat(h.lng))<0.0003;
      });
      if(!hasFilter){m.setMap(mapInstanceRef.current);return;}
      const dispMatch = home&&home.prescreen&&activeFilters.includes("disp:"+home.prescreen);
      m.setMap(dispMatch?mapInstanceRef.current:null);
    });

    // Filter pipeline lead markers
    leadMarkersRef.current.forEach(m=>{
      if(!hasFilter){m.setMap(mapInstanceRef.current);return;}
      const pos=m.getPosition();
      const lead = leads&&leads.find(l=>{
        if(!l.address) return false;
        return m.getTitle()===l.name||m.getTitle()===l.address;
      });
      const stageMatch = lead&&activeFilters.includes("stage:"+lead.stage);
      const dispMatch = activeFilters.includes("disp:lead"); // lead disposition
      m.setMap(stageMatch||dispMatch?mapInstanceRef.current:null);
    });

    // Hide/show OSM building bubbles based on filter
    buildingMarkersRef.current.forEach(m=>{
      m.setMap(hasFilter?null:mapInstanceRef.current);
    });
  },[activeFilters, homes, leads, mapLoaded]); // homes excluded — prevents bubble flicker

  // Init Places Autocomplete service
  React.useEffect(()=>{
    if(!mapLoaded||!window.google||!window.google.maps.places)return;
    autocompleteRef.current = new window.google.maps.places.AutocompleteService();
  },[mapLoaded]);

  const handleSearchInput = (val) => {
    setSearchVal(val);
    if(!val.trim()){setSuggestions([]);setShowSuggestions(false);return;}
    clearTimeout(searchDebounceRef.current);
    searchDebounceRef.current = setTimeout(()=>{
      if(!autocompleteRef.current)return;
      autocompleteRef.current.getPlacePredictions(
        {input:val, types:["address"]},
        (predictions, status)=>{
          if(status===window.google.maps.places.PlacesServiceStatus.OK&&predictions){
            setSuggestions(predictions.slice(0,6));
            setShowSuggestions(true);
          } else {
            setSuggestions([]);
            setShowSuggestions(false);
          }
        }
      );
    },300);
  };

  const handleSelectSuggestion = async (suggestion) => {
    setSearchVal(suggestion.description);
    setSuggestions([]);
    setShowSuggestions(false);
    // Geocode the selected address and pan map
    const coords = await geocodeAddress(suggestion.description);
    if(coords&&mapInstanceRef.current){
      mapInstanceRef.current.panTo(coords);
      mapInstanceRef.current.setZoom(18);
      // Add a temporary search marker
      if(window._searchMarker) window._searchMarker.setMap(null);
      window._searchMarker = new window.google.maps.Marker({
        position:coords,
        map:mapInstanceRef.current,
        icon:{
          path:window.google.maps.SymbolPath.CIRCLE,
          scale:14,
          fillColor:"#6b2d4e",
          fillOpacity:0.9,
          strokeColor:"#fff",
          strokeWeight:3,
        },
        title:suggestion.description,
        animation:window.google.maps.Animation.DROP,
      });
    }
  };

  // Place pipeline lead markers on map
  React.useEffect(()=>{
    if(!mapInstanceRef.current||!window.google||!leads) return;
    // Increment generation — any in-flight geocoding from previous render will be stale
    const gen = ++leadGenRef.current;
    // Immediately clear ALL lead markers from map
    leadMarkersRef.current.forEach(m=>m.setMap(null));
    leadMarkersRef.current=[];
    if(!leads||leads.length===0) return; // nothing to place
    // Only geocode leads that have an address but no canvass pin yet
    const leadsWithAddress = leads.filter(l=>l.address&&l.address.trim());
    leadsWithAddress.forEach(async(lead)=>{
      // Check if there's already a canvass pin for this address
      const alreadyPinned = homes.some(h=>
        h.address&&h.address.toLowerCase().includes(lead.address.split(",")[0].toLowerCase().trim())
      );
      if(alreadyPinned) return;
      // Geocode the lead address
      try {
        const res = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(lead.address)}&key=${gmapsKey}`);
        const data = await res.json();
        if(!data.results||!data.results[0]) return;
        const loc = data.results[0].geometry.location;
        // Stale check — if filter changed since we started geocoding, discard
        if(gen!==leadGenRef.current) return;
        const marker = new window.google.maps.Marker({
          position:{lat:loc.lat,lng:loc.lng},
          map:mapInstanceRef.current,
          icon:{
            path:window.google.maps.SymbolPath.CIRCLE,
            scale:14,
            fillColor:"#10b981",
            fillOpacity:0.9,
            strokeColor:"#fff",
            strokeWeight:2.5,
          },
          label:{text:"⚡",fontSize:"14px"},
          title:lead.name||lead.address,
          zIndex:10,
        });
        marker.addListener("click",()=>{
          setSelectedHome({
            id:null,
            _isPipelineLead:true,
            _leadId:lead.id,
            address:lead.address||"",
            owner_name:lead.name||"",
            phone:lead.phone||"",
            notes:lead.notes||"",
            prescreen:"lead",
            lat:loc.lat,
            lng:loc.lng,
          });
        });
        leadMarkersRef.current.push(marker);
      } catch(e){ console.error("Lead geocode error:",e); }
    });
  },[leads, homes, mapLoaded]);

  React.useEffect(()=>{
    if(!mapInstanceRef.current||!window.google)return;
    markersRef.current.forEach(m=>m.setMap(null));
    markersRef.current=[];
    homes.forEach(home=>{
      if(!home.lat||!home.lng)return;
      // Filter by viewing scope
      if(allowedOwnerIds){
        const homeOwner = home.added_by || (currentUser&&currentUser.id);
        if(!allowedOwnerIds.has(homeOwner)) return;
      }
      const dispEmojis={lead:"⚡",nh:"🏠",cb:"↩️",nn:"⏰",nq:"🚫"};
      const dispColors={lead:"#10b981",nh:"#3b82f6",cb:"#f59e0b",nn:"#f97316",nq:"#ef4444"};
      const disp = home.prescreen||"";
      const emoji = dispEmojis[disp];
      const color = dispColors[disp]||"rgba(255,255,255,0.7)";
      const marker = emoji ? new window.google.maps.Marker({
        position:{lat:parseFloat(home.lat),lng:parseFloat(home.lng)},
        map:mapInstanceRef.current,
        label:{text:emoji, fontSize:"14px"},
        icon:{
          path:window.google.maps.SymbolPath.CIRCLE,
          scale:14,
          fillColor:color,
          fillOpacity:0.9,
          strokeColor:"#fff",
          strokeWeight:2,
        },
        title:home.address,
      }) : new window.google.maps.Marker({
        position:{lat:parseFloat(home.lat),lng:parseFloat(home.lng)},
        map:mapInstanceRef.current,
        icon:{
          path:window.google.maps.SymbolPath.CIRCLE,
          scale:11,
          fillColor:"rgba(255,255,255,0.85)",
          fillOpacity:0.85,
          strokeColor:"#1a2456",
          strokeWeight:2,
        },
        title:home.address,
      });
      marker.addListener("click",()=>setSelectedHome(home));
      markersRef.current.push(marker);
    });
  },[homes,mapLoaded,allowedOwnerIds]);

  const geocodeAddress=async(address)=>{
    const res=await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(address)}&key=${gmapsKey}`);
    const data=await res.json();
    if(data.results&&data.results.length>0){
      const loc=data.results[0].geometry.location;
      return {lat:loc.lat,lng:loc.lng};
    }
    return null;
  };

  // Fetch buildings from OpenStreetMap Overpass API
  const fetchBuildings = async () => {
    if(!mapInstanceRef.current||!window.google) return;
    const bounds = mapInstanceRef.current.getBounds();
    if(!bounds) return;
    const zoom = mapInstanceRef.current.getZoom();
    if(zoom < 14) {
      buildingMarkersRef.current.forEach(m=>m.setMap(null));
      buildingMarkersRef.current=[];
      lastBuildingFetchRef.current=null;
      return;
    }
    const ne = bounds.getNorthEast();
    const sw = bounds.getSouthWest();
    const bbox = `${sw.lat()},${sw.lng()},${ne.lat()},${ne.lng()}`;
    if(lastBuildingFetchRef.current===bbox) return;
    lastBuildingFetchRef.current=bbox;
    try {
      const query = `[out:json][timeout:25];(way["building"](${bbox});relation["building"](${bbox}););out center 300;`;
      const url = `https://overpass-api.de/api/interpreter`;
      const res = await fetch(url, {
        method:"POST",
        body:`data=${encodeURIComponent(query)}`,
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
      });
      if(!res.ok) throw new Error("Overpass HTTP "+res.status);
      const data = await res.json();
      // Clear old building markers
      buildingMarkersRef.current.forEach(m=>m.setMap(null));
      buildingMarkersRef.current=[];
      (data.elements||[]).forEach(el=>{
        const lat = el.lat || el.center?.lat;
        const lng = el.lon || el.center?.lon;
        if(!lat||!lng) return;
        // Check if this location already has a manual pin
        const alreadyPinned = homes.some(h=>
          h.lat&&h.lng&&
          Math.abs(parseFloat(h.lat)-lat)<0.0003&&
          Math.abs(parseFloat(h.lng)-lng)<0.0003
        );
        const marker = new window.google.maps.Marker({
          position:{lat,lng},
          map:mapInstanceRef.current,
          icon:{
            path:window.google.maps.SymbolPath.CIRCLE,
            scale:9,
            fillColor:"rgba(255,255,255,0.85)",
            fillOpacity:0.85,
            strokeColor:"#1a2456",
            strokeWeight:2,
            strokeOpacity:0.8,
          },
          zIndex:1,
          clickable:true,
        });
        marker.addListener("click",()=>{
          // Always check current homes (via ref to avoid stale closure)
          const savedHome=homesRef.current.find(h=>h.lat&&h.lng&&Math.abs(parseFloat(h.lat)-lat)<0.0003&&Math.abs(parseFloat(h.lng)-lng)<0.0003);
          if(savedHome){setSelectedHome(savedHome);return;}
          // Reverse geocode then show popup for new home
          const geocoder=new window.google.maps.Geocoder();
          geocoder.geocode({location:{lat,lng}},(results,status)=>{
            const addr=status==="OK"&&results[0]?results[0].formatted_address:`${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            setSelectedHome({id:null,address:addr,owner_name:"",phone:"",notes:"",prescreen:"",lat,lng,_isTemp:true});
          });
        });
        buildingMarkersRef.current.push(marker);
      });
    } catch(e) { console.error("Overpass error:",e); }
  };

  const placeMyLocationMarker = (coords) => {
    if(!mapInstanceRef.current||!window.google) return;
    if(myLocationMarkerRef.current) myLocationMarkerRef.current.setMap(null);
    // Outer pulse circle
    myLocationMarkerRef.current = new window.google.maps.Marker({
      position: coords,
      map: mapInstanceRef.current,
      icon: {
        path: "M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z",
        fillColor: "#1a2456",
        fillOpacity: 1,
        strokeColor: "#fff",
        strokeWeight: 2,
        scale: 1.8,
        anchor: new window.google.maps.Point(12, 22),
      },
      title: "Your Location",
      zIndex: 999,
    });
  };

  const goToMyLocation = () => {
    if(!navigator.geolocation){alert("Location not available on this device.");return;}
    setLocating(true);
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        const coords={lat:pos.coords.latitude,lng:pos.coords.longitude};
        if(mapInstanceRef.current){
          mapInstanceRef.current.panTo(coords);
          mapInstanceRef.current.setZoom(18);
        }
        placeMyLocationMarker(coords);
        setLocating(false);
      },
      ()=>{
        setLocating(false);
        alert("Could not get your location. Make sure location access is allowed.");
      },
      {enableHighAccuracy:true,timeout:8000}
    );
  };

  const handleAddHome=async()=>{
    if(!addForm.address.trim())return;
    setSaving(true);setGeocoding(true);
    try{
      const coords=await geocodeAddress(addForm.address);
      setGeocoding(false);
      const payload={
        address:addForm.address.trim(),
        owner_name:addForm.ownerName.trim()||null,
        phone:addForm.phone.trim()||null,
        prescreen:addForm.prescreen||null,
        notes:addForm.notes.trim()||null,
        lat:coords?.lat||null,
        lng:coords?.lng||null,
        updated_at:new Date().toISOString(),
      };
      await sb.from("canvass_homes").insert(payload);
      setAddForm({address:"",ownerName:"",phone:"",prescreen:"",notes:""});
      setShowAddForm(false);
      await loadHomes();
      if(coords&&mapInstanceRef.current){
        mapInstanceRef.current.panTo(coords);
        mapInstanceRef.current.setZoom(15);
      }
    }catch(e){setGeocoding(false);alert("Error: "+e.message);}
    setSaving(false);
  };

  const handleDeleteHome=async(id)=>{
    await sb.from("canvass_homes").delete().eq("id",id);
    setSelectedHome(null);
    await loadHomes();
  };

  const prescreenLabel=(p)=>({yes:"✓ Interested",maybe:"Maybe",no:"Not Interested",no_answer:"No Answer"})[p]||"";
  const prescreenColor=(p)=>({yes:"#10b981",maybe:"#f59e0b",no:"#ef4444",no_answer:"#94a3b8"})[p]||"#94a3b8";

  if(mapError) return(
    <div style={{minHeight:400,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:40}}>
      <div style={{fontSize:40,marginBottom:16}}>🗺️</div>
      <div style={{fontSize:16,fontWeight:700,color:"#ef4444",marginBottom:8}}>Map Error</div>
      <div style={{fontSize:13,color:"#94a3b8",textAlign:"center"}}>{mapError}</div>
    </div>
  );

  const btnStyle = {width:48,height:48,borderRadius:12,background:"rgba(20,20,30,0.85)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.4)",backdropFilter:"blur(4px)"};

  return(
    <div style={{position:"relative",height:"calc(100vh - 110px)",overflow:"hidden"}}>

      {/* Map fills everything */}
      {!mapLoaded?(
        <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:"#1a2456"}}>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:40,marginBottom:12}}>🛰️</div>
            <div style={{fontSize:14,color:"#fff",fontWeight:600,opacity:0.8}}>Loading map...</div>
          </div>
        </div>
      ):(
        <div ref={mapRef} style={{width:"100%",height:"100%"}}/>
      )}

      {/* Left side controls — like the reference image */}
      {mapLoaded && (
        <div style={{position:"absolute",top:12,left:12,display:"flex",flexDirection:"column",gap:8,zIndex:200}}>
          {/* Satellite toggle */}
          <button onClick={()=>{
            if(!mapInstanceRef.current)return;
            const cur=mapInstanceRef.current.getMapTypeId();
            const next=cur==="roadmap"?"satellite":"roadmap";
            mapInstanceRef.current.setMapTypeId(next);
            setSatellite(s=>{localStorage.setItem("canvass_satellite",!s);return !s;});
          }} style={{...btnStyle,border:satellite?"2px solid #10b981":"none",background:satellite?"rgba(16,185,129,0.2)":"rgba(20,20,30,0.85)"}} title={satellite?"Switch to Map":"Switch to Satellite"}>
            <span style={{fontSize:20}}>{satellite?"🛰️":"🗺️"}</span>
          </button>

          {/* Homes toggle */}
          <button onClick={()=>{
            const next=!showBuildings;
            setShowBuildings(next);
            if(!next){buildingMarkersRef.current.forEach(m=>m.setMap(null));buildingMarkersRef.current=[];}
            else fetchBuildings();
          }} style={{...btnStyle,border:showBuildings?"2px solid #10b981":"none"}} title="Toggle Homes">
            <span style={{fontSize:20}}>🏠</span>
          </button>

          {/* My location */}
          <button onClick={goToMyLocation} style={btnStyle} title="My Location">
            <span style={{fontSize:20}}>{locating?"⏳":"➤"}</span>
          </button>

          {/* Filter */}
          <button onClick={()=>setShowFilter(f=>!f)}
            style={{...btnStyle,background:activeFilters.length>0?"rgba(107,45,78,0.95)":"rgba(20,20,30,0.85)",border:activeFilters.length>0?"2px solid #6b2d4e":"none",position:"relative"}}
            title="Filter">
            <span style={{fontSize:20}}>🔍</span>
            {activeFilters.length>0&&<div style={{position:"absolute",top:-4,right:-4,width:16,height:16,borderRadius:"50%",background:"#6b2d4e",fontSize:9,fontWeight:800,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>{activeFilters.length}</div>}
          </button>
          {/* Add home */}
          <button onClick={()=>setShowAddForm(true)} style={{...btnStyle,background:"rgba(26,36,86,0.9)"}} title="Add Home">
            <span style={{fontSize:22,color:"#fff",fontWeight:700}}>+</span>
          </button>
        </div>
      )}

      {/* Custom fullscreen button — left of eye */}
      {mapLoaded && (
        <button onClick={()=>{
          const el = mapRef.current;
          if(el){
            if(!document.fullscreenElement){
              (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen)?.call(el);
            } else {
              (document.exitFullscreen||document.webkitExitFullscreen)?.call(document);
            }
          }
        }} style={{position:"absolute",top:12,right:68,zIndex:400,width:48,height:48,borderRadius:12,background:"rgba(20,20,30,0.85)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.4)",backdropFilter:"blur(4px)"}}>
          <span style={{fontSize:18,color:"#fff"}}>⛶</span>
        </button>
      )}
      {/* View Scope Button — separate from filter */}
      {mapLoaded && (
        <CanvassViewPicker
          isOwner={isOwner}
          isPrivileged={isPrivileged}
          visibleTeams={visibleTeams}
          repProfiles={repProfiles}
          canvassLeadFilter={canvassLeadFilter}
          setCanvassLeadFilter={setCanvassLeadFilter}
        />
      )}

      {/* Filter Panel — dispositions & lead stages only */}
      {showFilter && (
        <div style={{position:"absolute",top:12,left:68,background:"rgba(18,18,28,0.97)",borderRadius:14,padding:"16px",zIndex:300,width:240,maxHeight:"calc(100vh - 140px)",overflowY:"auto",boxShadow:"0 8px 30px rgba(0,0,0,0.5)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

// ── Google Calendar Integration ───────────────────────────────────────
const GCal = {
  _tokenClient: null,
  _accessToken: null,
  _tokenExpiry: null,

  isSignedIn() {
    return this._accessToken && Date.now() < this._tokenExpiry;
  },

  async signIn() {
    // Wait for GSI to be ready (up to 10s)
    await new Promise(res=>{
      if(window.google?.accounts?.oauth2){res();return;}
      if(!document.getElementById("gsi-script")){
        const s=document.createElement("script");
        s.id="gsi-script";
        s.src="https://accounts.google.com/gsi/client";
        s.onload=()=>res();
        s.onerror=()=>res();
        document.head.appendChild(s);
      }
      const check=setInterval(()=>{if(window.google?.accounts?.oauth2){clearInterval(check);res();}},300);
      setTimeout(()=>{clearInterval(check);res();},10000);
    });
    // Already have valid token — return immediately
    if(this.isSignedIn()) return this._accessToken;
    return new Promise((resolve, reject) => {
      if(!window.google?.accounts?.oauth2) {
        reject(new Error("Google Sign-In not available. Please refresh the app and try again."));
        return;
      }
      if(!this._tokenClient) {
        this._tokenClient = window.google.accounts.oauth2.initTokenClient({
          client_id: GCAL_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/calendar.events",
          callback: (resp) => {
            if(resp.error) { reject(new Error(resp.error_description||resp.error)); return; }
            this._accessToken = resp.access_token;
            this._tokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
            // Save email hint for silent re-auth next time
            try { if(resp.email) localStorage.setItem("gcal_hint", resp.email); } catch(e){}
            resolve(resp.access_token);
          },
          error_callback: (err) => { reject(new Error(err.message||"Sign-in failed")); },
        });
      }
      // Try silent refresh first using saved email hint
      const hint = (() => { try { return localStorage.getItem("gcal_hint")||""; } catch(e){ return ""; } })();
      if(hint) {
        // prompt:"" = silent, won't show popup if Google session still active
        this._tokenClient.requestAccessToken({prompt:"", login_hint:hint});
      } else {
        this._tokenClient.requestAccessToken({prompt:"select_account"});
      }
    });
  },

  parseAppointment(apptStr) {
    // Format: "Jun 15, 2026 - 5:00 PM to 6:30 PM"
    if(!apptStr) return null;
    try {
      const dashIdx = apptStr.indexOf(" - ");
      if(dashIdx === -1) return null;
      const datePart = apptStr.substring(0, dashIdx).trim();
      const afterDash = apptStr.substring(dashIdx + 3).trim();
      const [startTime, endTime] = afterDash.split(" to ").map(t => t.trim());
      const parseDateTime = (date, time) => {
        const d = new Date(`${date} ${time}`);
        return d.toISOString();
      };
      return {
        start: parseDateTime(datePart, startTime),
        end: parseDateTime(datePart, endTime || startTime),
      };
    } catch(e) { return null; }
  },

  async createEvent(lead) {
    const token = await this.signIn();
    const times = this.parseAppointment(lead.appointment);
    const event = {
      summary: lead.name || "Lead Appointment",
      location: lead.address || "",
      description: [
        lead.phone ? `Phone: ${lead.phone}` : "",
        lead.email ? `Email: ${lead.email}` : "",
        lead.utility ? `Utility: ${lead.utility}` : "",
        lead.notes ? `Notes: ${lead.notes}` : "",
        `Stage: ${lead.stage || ""}`,
        `Pipeline Push Lead`,
      ].filter(Boolean).join("\n"),
      start: times
        ? { dateTime: times.start, timeZone: "America/Chicago" }
        : { date: new Date().toISOString().split("T")[0] },
      end: times
        ? { dateTime: times.end, timeZone: "America/Chicago" }
        : { date: new Date().toISOString().split("T")[0] },
      colorId: "2", // sage green
    };

    const res = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(GCAL_CALENDAR_ID)}/events`,
      {
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify(event),
      }
    );
    if(!res.ok) throw new Error(await res.text());
    return await res.json();
  },

  async updateEvent(eventId, lead) {
    const token = await this.signIn();
    const times = this.parseAppointment(lead.appointment);
    const event = {
      summary: lead.name || "Lead Appointment",
      location: lead.address || "",
      description: [
        lead.phone ? `Phone: ${lead.phone}` : "",
        lead.email ? `Email: ${lead.email}` : "",
        lead.notes ? `Notes: ${lead.notes}` : "",
        `Stage: ${lead.stage || ""}`,
        `Pipeline Push Lead`,
      ].filter(Boolean).join("\n"),
      start: times
        ? { dateTime: times.start, timeZone: "America/Chicago" }
        : { date: new Date().toISOString().split("T")[0] },
      end: times
        ? { dateTime: times.end, timeZone: "America/Chicago" }
        : { date: new Date().toISOString().split("T")[0] },
    };
    const res = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(GCAL_CALENDAR_ID)}/events/${eventId}`,
      {
        method: "PATCH",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
        },
        body: JSON.stringify(event),
      }
    );
    if(!res.ok) throw new Error(await res.text());
    return await res.json();
  },

  async deleteEvent(eventId) {
    const token = await this.signIn();
    await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(GCAL_CALENDAR_ID)}/events/${eventId}`,
      { method: "DELETE", headers: { Authorization: `Bearer ${token}` } }
    );
  },
};

        style={label?{flex:1,padding:"10px 0",borderRadius:8,border:"1.5px solid #1a2456",background:"#f0f4ff",color:"#1a2456",fontWeight:700,fontSize:13,cursor:"pointer"}:{width:30,height:30,borderRadius:8,background:isBooked?"#d1fae5":"#e0f2fe",border:isBooked?"1.5px solid #10b981":"none",fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        {label||(isBooked?"✅":"📅")}
      </button>
      {showModal&&<CalendarEventModal lead={localLead} onClose={()=>setShowModal(false)} onUpdate={handleUpdate} creatorName={creatorName}/>}
    </>
  );
}

// Personal Appointment / Callback picker
function PersonalApptButton({onSelect, label}) {
  const [show, setShow] = React.useState(false);
  const [date, setDate] = React.useState("");
  const [time, setTime] = React.useState("");
  const dark = useDark();
  const iStyle = {width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${dark?"#334155":"#c8b8a2"}`,background:dark?"#1e293b":"#fff",color:dark?"#f1f5f9":"#1a2456",fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box"};

  const handleConfirm = () => {
    if(!date) return;
    const d = new Date(date);
    const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const dateStr = `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    let apptStr = dateStr;
    if(time){
      const [h,m] = time.split(":").map(Number);
      const ampm = h>=12?"PM":"AM";
      const h12 = h%12||12;
      const timeStr = `${h12}:${String(m).padStart(2,"0")} ${ampm}`;
      apptStr = `${dateStr} - ${timeStr} to ${h12+1}:${String(m).padStart(2,"0")} ${ampm}`;
    }
    onSelect(apptStr);
    setShow(false);
  };

  return (
    <>
      <button onClick={()=>setShow(true)}
        style={{flex:1,padding:"10px 0",borderRadius:8,border:"1.5px solid #f59e0b",background:"#fffbeb",color:"#92400e",fontWeight:700,fontSize:13,cursor:"pointer"}}>
        {label||"↩️ Personal CB"}

      {show&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:3000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setShow(false)}>
          <div style={{background:dark?"#1e293b":"#faf6f0",borderRadius:"20px 20px 0 0",padding:"24px 20px 36px",width:"min(100vw,480px)"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontSize:17,fontWeight:800,color:dark?"#f1f5f9":"#1a2456"}}>↩️ Personal Callback</div>
              <button onClick={()=>setShow(false)} style={{background:"none",border:"none",fontSize:22,color:"#94a3b8",cursor:"pointer"}}>✕</button>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{display:"block",fontSize:12,fontWeight:600,color:"#94a3b8",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>Date</label>
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={iStyle}/>

            <div style={{marginBottom:22}}>
              <label style={{display:"block",fontSize:12,fontWeight:600,color:"#94a3b8",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.05em"}}>Time (optional)</label>
              <input type="time" value={time} onChange={e=>setTime(e.target.value)} style={iStyle}/>
            </div>
            <button onClick={handleConfirm} disabled={!date}
              style={{width:"100%",padding:"13px 0",borderRadius:10,border:"none",background:date?"linear-gradient(135deg,#f59e0b,#d97706)":"#e2e8f0",color:date?"#fff":"#94a3b8",fontWeight:700,fontSize:15,cursor:date?"pointer":"default"}}>
              Set Callback
            </button>

  );

function CalendarEventModal({lead, onClose, onUpdate, creatorName}) {
  const dark = useDark();
  const isBooked = !!lead.gcal_event_id;
  const [view, setView] = React.useState(isBooked?"manage":"calendar"); // manage | calendar | slots | confirm
  const [selectedDay, setSelectedDay] = React.useState(null);
  const [slots, setSlots] = React.useState([]);
  const [selectedSlot, setSelectedSlot] = React.useState(null);
  const [loadingSlots, setLoadingSlots] = React.useState(false);
  const [booking, setBooking] = React.useState(false);
  const [done, setDone] = React.useState(false);
  const [doneMsg, setDoneMsg] = React.useState("");
  const [noAccess, setNoAccess] = React.useState(false);
  const [calMonth, setCalMonth] = React.useState(new Date());

  // Calendar grid helpers
  const today = new Date(); today.setHours(0,0,0,0);
  const monthStart = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1);
  const monthEnd = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 0);
  const startPad = monthStart.getDay();
  const days = [];
  for(let i=0;i<startPad;i++) days.push(null);
  for(let d=1;d<=monthEnd.getDate();d++) days.push(new Date(calMonth.getFullYear(),calMonth.getMonth(),d));

  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  const fetchSlotsForDay = async(day) => {
    setLoadingSlots(true);
    setSlots([]);
    try {
      const dayStart = new Date(day); dayStart.setHours(0,0,0,0);
      const dayEnd = new Date(day); dayEnd.setHours(23,59,59,999);
      // Use API key for reading — no OAuth needed
      const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(GCAL_CALENDAR_ID)}/events?timeMin=${dayStart.toISOString()}&timeMax=${dayEnd.toISOString()}&singleEvents=true&orderBy=startTime&key=AIzaSyCvNBb2HPuzSCV7Ml53uvITXw2GSvCISdU`;
      const res = await fetch(url);
      if(!res.ok){
        const err = await res.json();
        console.error("Calendar fetch error:", err);
        if(res.status===403) setNoAccess(true);
        setLoadingSlots(false);
        return;
      }
      const data = await res.json();
      const open = (data.items||[]).filter(e=>
        e.summary&&e.summary.toLowerCase().includes("open slot")
        &&!e.description?.includes("BOOKED:")
      );
      setSlots(open);
    } catch(e){console.error(e);}
    setLoadingSlots(false);
  };

  const handleDayClick = async(day) => {
    if(!day||day<today) return;
    setSelectedDay(day);
    setView("slots");
    await fetchSlotsForDay(day);
  };

  const handleRemoveBooking = async() => {
    try {
      const token = await GCal.signIn();
      // Restore calendar event back to Open Slot
      await fetch(
        `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(GCAL_CALENDAR_ID)}/events/${lead.gcal_event_id}`,
        {method:"PATCH",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
         body:JSON.stringify({summary:"Open Slot",description:"",colorId:"7"})}
      );
      // Clear gcal_event_id AND appointment from lead, revert stage
      if(lead.id){
        await sb.from("leads").update({
          gcal_event_id:null,
          appointment:null,
          stage:"Lead: Need Bill/Appointment",
          updated_at:new Date().toISOString()
        }).eq("id",lead.id);
      }
      if(onUpdate) onUpdate({gcal_event_id:null,appointment:null,stage:"Lead: Need Bill/Appointment"});
      setDoneMsg("removed");
      setDone(true);
    } catch(e){console.error(e);alert("Error removing: "+e.message);}
  };

  const handleBookSlot = async() => {
    if(!selectedSlot) return;
    setBooking(true);
    try {
      const token = await GCal.signIn();
      // If lead already has a booked slot, restore it to "Open Slot" first
      if(lead.gcal_event_id && lead.gcal_event_id !== selectedSlot.id) {
        try {
          await fetch(
            `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(GCAL_CALENDAR_ID)}/events/${lead.gcal_event_id}`,
            {method:"PATCH",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},
             body:JSON.stringify({summary:"Open Slot",description:"",colorId:"7"})}
          );
        } catch(e){ console.error("Error restoring old slot:",e); }
      }
      // Update the event with lead info
      const updatedEvent = {
        summary: `AC - ${lead.name||"Lead"}`,
        description: `BOOKED:\nLead: ${lead.name||""}\nPhone: ${lead.phone||""}\nAddress: ${lead.address||""}\nCreated by: ${creatorName||lead.creator_name||""}\nNotes: ${lead.notes||""}\nBooked via Pipeline Push`,
        colorId: "10", // basil green = booked
      };
      const res = await fetch(
        `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(GCAL_CALENDAR_ID)}/events/${selectedSlot.id}`,
        {method:"PATCH",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(updatedEvent)}
      );
      if(!res.ok) throw new Error(await res.text());
      // Save appointment to lead
      const startTime = new Date(selectedSlot.start.dateTime||selectedSlot.start.date);
      const endTime = new Date(selectedSlot.end.dateTime||selectedSlot.end.date);
      const apptStr = `${startTime.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})} - ${startTime.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})} to ${endTime.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}`;
      if(lead.id){
        await sb.from("leads").update({
          appointment:apptStr,
          gcal_event_id:selectedSlot.id,
          stage:"AC / Scheduled",
          updated_at:new Date().toISOString()
        }).eq("id",lead.id);
      }
      if(onUpdate) onUpdate({gcal_event_id:selectedSlot.id,appointment:apptStr,stage:"AC / Scheduled"});
      setDoneMsg("booked");
      setDone(true);
    } catch(e){
      console.error("Booking error:",e);
      alert("Booking failed: " + (e.message||"Unknown error. Please try again."));
    }
    setBooking(false);
  };

  const iStyle={width:"100%",padding:"9px 12px",borderRadius:8,border:`1.5px solid ${dark?"#334155":"#c8b8a2"}`,background:dark?"#1e293b":"#fff",color:dark?"#f1f5f9":"#1a2456",fontSize:14,fontFamily:"inherit",outline:"none",boxSizing:"border-box"};

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:3000,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
      <div style={{background:dark?"#1e293b":"#faf6f0",borderRadius:"20px 20px 0 0",padding:"24px 20px 36px",width:"min(100vw,480px)",maxHeight:"85vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {view!=="calendar"&&view!=="manage"&&!done&&!noAccess&&(
              <button onClick={()=>setView("calendar")} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:18,padding:0}}>←</button>
            )}
            <div style={{fontSize:17,fontWeight:800,color:dark?"#f1f5f9":"#1a2456"}}>
              {done?(doneMsg==="removed"?"Booking Removed":"Appointment Booked!"):noAccess?"No Calendar Access":view==="manage"?"Manage Booking":view==="calendar"?"Pick a Day":view==="slots"?"Available Slots":"Confirm Booking"}
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,color:"#94a3b8",cursor:"pointer"}}>✕</button>
        </div>

        {/* Manage existing booking */}
        {!done&&!noAccess&&view==="manage"&&(
          <div>
            <div style={{background:dark?"#0f172a":"#fff",borderRadius:12,padding:"16px",marginBottom:16,border:"1.5px solid #10b981"}}>
              <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>Currently booked</div>
              <div style={{fontSize:15,fontWeight:700,color:dark?"#f1f5f9":"#1a2456"}}>{lead.name}</div>
              {lead.appointment&&<div style={{fontSize:13,color:"#10b981",marginTop:4}}>{lead.appointment}</div>}
            </div>
            <button onClick={()=>setView("calendar")}
              style={{width:"100%",padding:"12px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#1a2456,#6b2d4e)",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",marginBottom:10}}>
              📅 Change Appointment
            </button>
            <button onClick={handleRemoveBooking}
              style={{width:"100%",padding:"12px 0",borderRadius:10,border:"1.5px solid #fee2e2",background:"transparent",color:"#ef4444",fontWeight:600,fontSize:15,cursor:"pointer"}}>
              🗑️ Remove from Calendar
            </button>
          </div>
        )}

        {/* No access */}
        {noAccess&&(
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:40,marginBottom:12}}>🔒</div>
            <div style={{fontSize:13,color:"#94a3b8",marginBottom:12}}>You don't have access to the Helios calendar.</div>
            <div style={{fontSize:13,color:"#6b2d4e",fontWeight:600,background:"#f5ede0",padding:"12px",borderRadius:10}}>Request access from your manager to be added to the Helios Google Calendar.</div>
          </div>
        )}

        {/* Done */}
        {done&&(
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:48,marginBottom:12}}>{doneMsg==="removed"?"🗑️":"✅"}</div>
            <div style={{fontSize:16,fontWeight:700,color:doneMsg==="removed"?"#ef4444":"#10b981",marginBottom:8}}>
              {doneMsg==="removed"?"Booking removed!":"Slot booked for "+lead.name+"!"}
            </div>
            <div style={{fontSize:13,color:"#94a3b8"}}>{doneMsg==="removed"?"Calendar event deleted.":"Lead moved to AC / Scheduled and added to Helios Calendar."}</div>
          </div>
        )}

        {/* Calendar picker */}
        {!done&&!noAccess&&view==="calendar"&&(
          <div>
            {/* Month nav */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <button onClick={()=>setCalMonth(m=>new Date(m.getFullYear(),m.getMonth()-1,1))}
                style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#6b2d4e",padding:"4px 8px"}}>‹</button>
              <div style={{fontWeight:700,color:dark?"#f1f5f9":"#1a2456"}}>{MONTHS[calMonth.getMonth()]} {calMonth.getFullYear()}</div>
              <button onClick={()=>setCalMonth(m=>new Date(m.getFullYear(),m.getMonth()+1,1))}
                style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#6b2d4e",padding:"4px 8px"}}>›</button>
            </div>
            {/* Day headers */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:8}}>
              {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>(
                <div key={d} style={{textAlign:"center",fontSize:11,fontWeight:600,color:"#94a3b8",padding:"4px 0"}}>{d}</div>
              ))}
            </div>
            {/* Days grid */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
              {days.map((day,i)=>{
                if(!day) return <div key={i}/>;
                const isPast = day < today;
                const isToday = day.getTime()===today.getTime();
                return(
                  <button key={i} onClick={()=>handleDayClick(day)} disabled={isPast}
                    style={{aspectRatio:"1",borderRadius:8,border:"none",background:isToday?"#1a2456":isPast?"transparent":"#f0edf5",color:isPast?"#c8b8a2":isToday?"#fff":"#1a2456",fontWeight:isToday?700:400,cursor:isPast?"default":"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {day.getDate()}
                  </button>
                );
              })}
            </div>
            <div style={{marginTop:16,fontSize:12,color:"#94a3b8",textAlign:"center"}}>Tap a day to see available closing slots</div>
          </div>
        )}

        {/* Slots list */}
        {!done&&!noAccess&&view==="slots"&&(
          <div>
            <div style={{fontSize:13,color:"#94a3b8",marginBottom:16}}>
              {selectedDay?.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}
            </div>
            {loadingSlots?(
              <div style={{textAlign:"center",padding:20,color:"#94a3b8"}}>Loading slots...</div>
            ):slots.length===0?(
              <div style={{textAlign:"center",padding:20}}>
                <div style={{fontSize:32,marginBottom:8}}>📭</div>
                <div style={{fontSize:14,color:"#94a3b8"}}>No open slots on this day.</div>
                <div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>Ask your manager to add slots to the Helios calendar.</div>
              </div>
            ):(
              slots.map(slot=>{
                const start = new Date(slot.start.dateTime||slot.start.date);
                const end = new Date(slot.end.dateTime||slot.end.date);
                const timeStr = `${start.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})} – ${end.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}`;
                return(
                  <div key={slot.id} onClick={()=>{setSelectedSlot(slot);setView("confirm");}}
                    style={{padding:"14px 16px",borderRadius:12,border:"1.5px solid #c8b8a2",background:dark?"#0f172a":"#fff",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div>
                      <div style={{fontWeight:700,color:dark?"#f1f5f9":"#1a2456",fontSize:14}}>{timeStr}</div>
                      <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{slot.summary}</div>
                    </div>
                    <div style={{color:"#10b981",fontWeight:700,fontSize:13}}>Open ›</div>
                  </div>
                );
              })
            )}
          </div>
        )}

        {/* Confirm */}
        {!done&&!noAccess&&view==="confirm"&&selectedSlot&&(()=>{
          const start = new Date(selectedSlot.start.dateTime||selectedSlot.start.date);
          const end = new Date(selectedSlot.end.dateTime||selectedSlot.end.date);
          const timeStr = `${start.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})} – ${end.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}`;
          return(
            <div>
              <div style={{background:dark?"#0f172a":"#fff",borderRadius:12,padding:"16px",marginBottom:20,border:"1.5px solid #c8b8a2"}}>
                <div style={{fontSize:13,color:"#94a3b8",marginBottom:4}}>Booking slot for</div>
                <div style={{fontSize:16,fontWeight:800,color:dark?"#f1f5f9":"#1a2456",marginBottom:4}}>{lead.name||"Lead"}</div>
                <div style={{fontSize:13,color:"#6b2d4e",fontWeight:600}}>{start.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
                <div style={{fontSize:13,color:"#6b2d4e",fontWeight:600}}>{timeStr}</div>
              </div>
              <div style={{fontSize:12,color:"#94a3b8",marginBottom:16,textAlign:"center"}}>This will book the slot and move the lead to AC / Scheduled.</div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setView("slots")}
                  style={{flex:1,padding:"12px 0",borderRadius:10,border:"1.5px solid #c8b8a2",background:"transparent",color:dark?"#94a3b8":"#475569",fontWeight:600,cursor:"pointer",fontSize:15}}>
                  Cancel
                </button>
                <button onClick={handleBookSlot} disabled={booking}
                  style={{flex:2,padding:"12px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#1a2456,#6b2d4e)",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:15}}>
                  {booking?"Booking...":"Yes, Book It"}
                </button>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}



function CopyTextButton({text, label}) {
  const [copied, setCopied] = React.useState(false);
  const doCopy = () => {
    const finish = () => { setCopied(true); setTimeout(()=>setCopied(false),1500); };
    try {
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(finish).catch(()=>{
          const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); finish();
        });
      } else {
        const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); finish();
      }
    } catch(e){ finish(); }
  };
  return (
    <button onClick={doCopy}
      style={{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:9,background:copied?"#dcfce7":"#eef2ff",color:copied?"#166534":"#4338ca",border:"none",fontSize:13,fontWeight:700,cursor:"pointer"}}>
      {copied?"✓ Copied":(label||"📋 Copy")}
    </button>
  );
}

  };

  const beginReorder = (clientY, isTouch, id) => {
    const draggedEl = listRef.current ? listRef.current.querySelector(`[data-mat-id="${id}"]`) : null;
    const H = draggedEl ? draggedEl.getBoundingClientRect().height + 10 : 80;
    dragState.current = {active:true, id, startY:clientY, lastY:clientY, idx:0, H};
    setDragId(id);
    setDragY(0);
    setDropIndex(null);
    const computeIdx = (cy) => {
      let index = 0;
      if(listRef.current){
        const cards = Array.prototype.slice.call(listRef.current.children).filter(el=>{ const cid=el.getAttribute("data-mat-id"); return cid && cid!==dragState.current.id; });
        for(let k=0;k<cards.length;k++){ const r=cards[k].getBoundingClientRect(); if(cy > r.top + r.height/2) index++; }
      }
      return index;
    };
    const onMove = (ev) => {
      const st = dragState.current;
      if(!st.active) return;
      if(isTouch && ev.cancelable) ev.preventDefault();
      const cy = isTouch ? (ev.touches&&ev.touches[0]?ev.touches[0].clientY:st.lastY) : ev.clientY;
      st.lastY = cy;
      st.idx = computeIdx(cy);
      setDragY(cy - st.startY);
      setDropIndex(st.idx);
    };
    const onEnd = () => {
      const st = dragState.current;
      const target = st.idx;
      st.active=false;
      setDragId(null);
      setDragY(0);
      setDropIndex(null);
      setMaterials(prev=>{
        const catList = prev.filter(m=>m.category===activeCat);
        const dragged = catList.find(m=>m.id===st.id);
        if(!dragged) return prev;
        const without = catList.filter(m=>m.id!==st.id);
        without.splice(Math.min(target, without.length), 0, dragged);
        // rebuild full materials: active category replaced with new order, others kept
        const known = CATEGORIES.map(c=>c.key);
        const newAll = [];
        CATEGORIES.forEach(c=>{ newAll.push(...(c.key===activeCat ? without : prev.filter(m=>m.category===c.key))); });
        newAll.push(...prev.filter(m=>!known.includes(m.category)));
        persistOrder(newAll);
        return newAll;
      });
      if(isTouch){ window.removeEventListener("touchmove",onMove); window.removeEventListener("touchend",onEnd); window.removeEventListener("touchcancel",onEnd); }
      else { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onEnd); }
    };
    if(isTouch){
      window.addEventListener("touchmove",onMove,{passive:false});
      window.addEventListener("touchend",onEnd);
      window.addEventListener("touchcancel",onEnd);
    } else {
      window.addEventListener("mousemove",onMove);
      window.addEventListener("mouseup",onEnd);
    }
  };

  const load = async () => {
    setLoading(true);
    try {
      const {data,error} = await sb.from("vault_materials").select("*").order("sort_order",{ascending:true,nullsFirst:false}).order("created_at",{ascending:false});
      if(error) throw error;
      setMaterials(data||[]);
      setErrMsg("");
    } catch(e){
      setMaterials([]);
      if(/relation|does not exist|find the table|schema/i.test((e&&(e.message||e.details||""))+"")) setErrMsg("Vault isn't set up yet — the materials table needs to be created in the database.");
      else setErrMsg("Couldn't load materials: "+((e&&(e.message||e.details))||"unknown error"));
    }
    setLoading(false);
  };

  const closeForm = () => { setEditing(null); setErrMsg(""); };

  const handleFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = ""; // allow re-selecting the same file later
    if(!file) return;
    if(file.type!=="application/pdf" && !/\.pdf$/i.test(file.name)){ setErrMsg("Please choose a PDF file."); return; }
    if(file.size > 25*1024*1024){ setErrMsg("That PDF is too large (max 25 MB)."); return; }
    setUploading(true); setErrMsg("");
    try {
      const safe = file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
      const path = `${userId}/${Date.now()}_${safe}`;
      const {error} = await sb.storage.from("vault-files").upload(path, file, {contentType:"application/pdf", upsert:false});
      if(error) throw error;
      const {data} = sb.storage.from("vault-files").getPublicUrl(path);
      setForm(f=>({...f, fileUrl:(data&&data.publicUrl)||"", fileName:file.name}));
    } catch(err){
      const msg=((err&&(err.message||err.error||err.details))||"")+"";
      if(/bucket|not found/i.test(msg)) setErrMsg("File storage isn't set up yet — the 'vault-files' bucket needs to be created.");
      else setErrMsg("Upload failed: "+(msg||"unknown error"));
    }
    setUploading(false);
  };
  const removeFile = () => setForm(f=>({...f, fileUrl:"", fileName:""}));

  const handleImage = async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if(!file) return;
    if(!/^image\//.test(file.type) && !/\.(png|jpe?g|gif|webp|heic)$/i.test(file.name)){ setErrMsg("Please choose an image file."); return; }
    if(file.size > 15*1024*1024){ setErrMsg("That image is too large (max 15 MB)."); return; }
    setUploadingImg(true); setErrMsg("");

  const save = async () => {

    setSaving(true);

        return (

            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:8,flex:1,minWidth:0}}>
                {canManage && (
                  <div
                    onMouseDown={e=>{e.preventDefault();e.stopPropagation();beginReorder(e.clientY,false,m.id);}}
                    onTouchStart={e=>{e.stopPropagation();if(e.touches&&e.touches[0])beginReorder(e.touches[0].clientY,true,m.id);}}
                    title="Drag to reorder"
                    style={{touchAction:"none",cursor:isDragged?"grabbing":"grab",color:isDragged?"#f97316":"#cbd5e1",fontSize:18,lineHeight:1,padding:"2px 2px",flexShrink:0,userSelect:"none",WebkitUserSelect:"none",marginTop:2}}>⠿</div>
                )}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:15,fontWeight:700,color:dark?"#f1f5f9":"#0f172a",marginBottom:m.description?4:0}}>{m.title}</div>
                  {m.description && <div style={{fontSize:13,color:dark?"#94a3b8":"#475569",lineHeight:1.45,whiteSpace:"pre-wrap"}}>{m.description}</div>}

                  <button onClick={()=>del(m)} title="Delete" style={{padding:"4px 9px",borderRadius:8,border:"1.5px solid #fecaca",background:"#fff",color:"#ef4444",fontSize:12,fontWeight:700,cursor:"pointer"}}>🗑</button>
                </div>

            {(m.url || m.file_url || m.image_url || m.body) && (

                {m.body && (
                  <button onClick={()=>setTemplateView(m)}
                    style={{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:9,background:dark?"#0f172a":"#f1f5f9",color:dark?"#cbd5e1":"#475569",border:`1.5px solid ${dark?"#334155":"#e2e8f0"}`,fontSize:13,fontWeight:700,cursor:"pointer"}}>

        </div>
